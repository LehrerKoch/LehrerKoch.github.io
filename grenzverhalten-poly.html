         style="max-width:min(100%, 400px); height:auto; display:block; margin:0 auto;">

<script>
// ---------------- Hilfsfunktionen ----------------
const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const pick = a => a[Math.floor(Math.random() * a.length)];

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while(b){ let t = b; b = a % b; a = t; }
  return a;
}

function simplifyFraction(num, den) {
  let g = gcd(num, den);
  return [num / g, den / g];
}

// ---------------- Koeffizientengenerator (aus polynom-ableitung) ----------------
function generateCoeff(isExtraFactor = false) {
  let allowDec  = document.getElementById('allowDecimals').checked;
  let allowFrac = document.getElementById('allowFractions').checked;

  if(isExtraFactor) {
    let choice = Math.random();
    if(choice < 0.4) {
      let val = rand(100, 9999) * (Math.random() < 0.5 ? 1 : -1);
      return { type: 'integer', value: val };
    } else if(choice < 0.7) {
      let num = rand(1, 9) * (Math.random() < 0.5 ? 1 : -1);
      let den = rand(10, 999);
      let [n, d] = simplifyFraction(num, den);
      return { type: 'fraction', num: n, den: d };
    } else {
      let val = (Math.random() * 0.99 + 0.01) * (Math.random() < 0.5 ? 1 : -1);
      return { type: 'decimal', value: parseFloat(val.toFixed(2)) };
    }
  }

  if(allowFrac && Math.random() < 0.3) {
    let num = rand(-9, 9); if(num === 0) num = 1;
    let den = rand(2, 9);
    let [n, d] = simplifyFraction(num, den);
    return { type: 'fraction', num: n, den: d };
  } else if(allowDec && Math.random() < 0.3) {
    let val = parseFloat((Math.random() * 18 - 9).toFixed(1));
    if(val === 0) val = 1;
    return { type: 'decimal', value: val };
  } else {
    let val = rand(-9, 9);
    return { type: 'integer', value: val };
  }
}

function coeffToString(coeff, skipOne = false) {
  if(coeff.type === 'fraction') {
    if(coeff.num === 0) return '0';
    let absNum = Math.abs(coeff.num);
    let absDen = Math.abs(coeff.den);
    if(absDen === 1) {
      let val = coeff.num < 0 ? -absNum : absNum;
      if(skipOne && Math.abs(val) === 1) return val < 0 ? '-' : '';
      return val.toString();
    }
    if(skipOne && absNum === absDen) return coeff.num < 0 ? '-' : '';
    let sign = coeff.num < 0 ? '-' : '';
    return `${sign}\\frac{${absNum}}{${absDen}}`;
  } else if(coeff.type === 'decimal') {
    if(coeff.value === 0) return '0';
    if(skipOne && coeff.value ===  1) return '';
    if(skipOne && coeff.value === -1) return '-';
    return coeff.value.toString().replace('.', '{,}');
  } else {
    if(coeff.value === 0) return '0';
    if(skipOne && coeff.value ===  1) return '';
    if(skipOne && coeff.value === -1) return '-';
    return coeff.value.toString();
  }
}

function coeffIsZero(c) {
  return c.type === 'fraction' ? c.num === 0 : c.value === 0;
}

function coeffIsNegative(c) {
  return c.type === 'fraction' ? c.num < 0 : c.value < 0;
}

function coeffLeadValue(c) {
  // Gibt einen numerischen Näherungswert zurück (für Vorzeichen-Bestimmung)
  if(c.type === 'fraction') return c.num / c.den;
  return c.value;
}

// ---------------- Aktuelles Polynom ----------------
let currentTask = null;  // { fLatex, degree, leadPositive, factor, fExpr }

// ---------------- Grenzwert berechnen ----------------
function computeLimit(side) {
  const { degree, leadPositive, factor } = currentTask;
  // Effektives Vorzeichen = Leitkoeffizient × ggf. Extra-Faktor
  const factorPositive = factor ? !coeffIsNegative(factor) : true;
  const effectivePositive = leadPositive === factorPositive; // XOR: beide gleich → positiv
  const leftSign = (degree % 2 === 0) ? effectivePositive : !effectivePositive;
  if(side === 'right') return effectivePositive ? '+\\infty' : '-\\infty';
  else                 return leftSign           ? '+\\infty' : '-\\infty';
}

// ---------------- Polynom-String ----------------
function buildPolyString(coeffs, explicitDeg) {
  // coeffs[0] = Koeffizient des höchsten Grades
  // explicitDeg: tatsächlicher Grad (nötig wenn coeffs nur 1 Element hat, z.B. x^n)
  let terms = [];
  let deg = (explicitDeg !== undefined) ? explicitDeg : coeffs.length - 1;
  for(let i = 0; i < coeffs.length; i++) {
    let pow = deg - i;
    let c = coeffs[i];
    if(coeffIsZero(c)) continue;
    let cStr = coeffToString(c, pow > 0);
    let term = '';
    if(pow === 0)       term = coeffToString(c, false);
    else if(pow === 1)  term = (cStr === '' ? 'x' : cStr === '-' ? '-x' : cStr + 'x');
    else                term = (cStr === '' ? `x^{${pow}}` : cStr === '-' ? `-x^{${pow}}` : cStr + `x^{${pow}}`);
    terms.push({ term, isNeg: coeffIsNegative(c) });
  }
  if(terms.length === 0) return '0';
  let s = terms[0].term;
  for(let i = 1; i < terms.length; i++) {
    s += terms[i].isNeg ? terms[i].term : '+' + terms[i].term;
  }
  return s;
}

// ---------------- Neue Aufgabe ----------------
function newTask() {
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('explanationDetails').open = false;

  const funcType   = document.querySelector('input[name="funcType"]:checked').value;
  const maxDeg     = parseInt(document.getElementById('maxDegree').value);
  const allowFact  = document.getElementById('allowFactor').checked;

  let degree;
  let coeffs = []; // Index 0 = höchster Grad

  if(funcType === 'power') {
    // x^n, kein Koeffizient
    degree = rand(1, maxDeg);
    coeffs = [{ type: 'integer', value: 1 }];
    // Kein Extra-Faktor
  } else if(funcType === 'powerWithFactor') {
    // a·x^n
    degree = rand(1, maxDeg);
    let c;
    do { c = generateCoeff(false); } while(coeffIsZero(c));
    coeffs = [c];
  } else {
    // Polynom: Koeffizient für jede Potenz
    degree = rand(1, maxDeg);
    for(let i = degree; i >= 0; i--) {
      if(i === degree) {
        let c;
        do { c = generateCoeff(false); } while(coeffIsZero(c));
        coeffs.push(c);
      } else {
        coeffs.push(generateCoeff(false));
      }
    }
  }

  // Leitkoeffizient-Vorzeichen nach Setting erzwingen (nur bei powerWithFactor + polynomial)
  const leadSignSetting = document.querySelector('input[name="leadSign"]:checked').value;
  if(funcType !== 'power' && leadSignSetting !== 'random') {
    const wantPositive = (leadSignSetting === 'positive');
    const isPositive   = !coeffIsNegative(coeffs[0]);
    if(wantPositive !== isPositive) {
      // Vorzeichen umkehren
      if(coeffs[0].type === 'fraction') coeffs[0].num  *= -1;
      else                              coeffs[0].value *= -1;
    }
  }

  // Leitkoeffizient-Vorzeichen
  const leadPositive = !coeffIsNegative(coeffs[0]);

  // Polynom-String
  const polyStr = buildPolyString(coeffs, degree);

  // Extra-Faktor (nur bei Polynom)
  let factor = null;
  let fLatex = '';
  let fExpr  = polyStr; // für ableitungsrechner (nicht benötigt, aber analog)

  if(allowFact && funcType === 'polynomial' && Math.random() < 0.4) {
    factor = generateCoeff(true);
    while(coeffIsZero(factor)) factor = generateCoeff(true);
    const fStr = coeffToString(factor, false);
    fLatex = `${fStr}\\left(${polyStr}\\right)`;
  } else {
    fLatex = polyStr;
  }

  // isPure: nur ein Term (Potenz- oder Potenz-mit-Faktor), kein +\ldots nötig
  const isPure = (funcType === 'power' || funcType === 'powerWithFactor');

  currentTask = { fLatex, degree, leadPositive, coeffs, factor, isPure };

  // Skizze aktualisieren
  updateSketch();

  document.getElementById('task').innerHTML = `$$f(x) = ${fLatex}$$`;
  setupChoices();

  document.querySelectorAll('input[type="radio"][name="left"], input[type="radio"][name="right"]').forEach(r => {
    r.disabled = false;
  });

  MathJax.typesetPromise().then(() => scaleAllElements());
}

// ---------------- Antwort-Radiogruppen ----------------
function createRadioGroup(containerId, name, values) {
  const cont = document.getElementById(containerId);
  cont.innerHTML = '';
  values.forEach(v => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="radio" name="${name}" value="${v}"> $${v}$`;
    cont.appendChild(label);
  });
}

function setupChoices() {
  const values = ['+\\infty', '-\\infty'];
  createRadioGroup('leftChoices',  'left',  values);
  createRadioGroup('rightChoices', 'right', values);
  saveSettingsToURL();
  MathJax.typesetPromise().then(() => scaleAllElements());
}

// ---------------- Lösung überprüfen ----------------
function checkSolution() {
  ['left', 'right'].forEach(side => {
    const correct = computeLimit(side);
    const radios  = document.querySelectorAll(`input[name="${side}"]`);
    radios.forEach(r => {
      r.parentElement.classList.remove('correct', 'wrong');
      r.disabled = true;
      const isCorrect = r.value === correct;
      if(r.checked) {
        r.parentElement.classList.add(isCorrect ? 'correct' : 'wrong');
      } else if(isCorrect) {
        r.parentElement.classList.add('correct');
      }
    });
  });
}

// ---------------- Begründung ----------------
function updateExplanation() {
  if(!currentTask) return;
  const isTestMode = document.getElementById('explanationModeSwitch').checked;
  const url = new URL(window.location);
  url.searchParams.set('explanationMode', isTestMode ? 'test' : 'argument');
  window.history.replaceState({}, '', url);
  if(isTestMode) showTestValues();
  else           showArgument();
}

function evalPoly(coeffs, x) {
  // coeffs[0] = höchster Grad
  let deg = coeffs.length - 1;
  let val = 0;
  for(let i = 0; i < coeffs.length; i++) {
    let pow = deg - i;
    let c = coeffLeadValue(coeffs[i]);
    val += c * Math.pow(x, pow);
  }
  return val;
}

function formatSci(x) {
  if(x === 0) return '0';
  if(!isFinite(x)) return x > 0 ? '+\\infty' : '-\\infty';
  if(Math.abs(x) < 1e4 && Math.abs(x) >= 0.01) {
    return x.toFixed(2).replace('.', '{,}');
  }
  const exp  = Math.floor(Math.log10(Math.abs(x)));
  const mant = x / Math.pow(10, exp);
  return mant.toFixed(2).replace('.', '{,}') + '\\cdot 10^{' + exp + '}';
}

function getDirection(val) {
  if(val > 0) return 'also positiv und sehr groß,';
  if(val < 0) return 'also negativ und sehr groß (dem Betrag nach),';
  return '';
}

function showTestValues() {
  const { coeffs, factor } = currentTask;
  const xVals = [-100, -500, 100, 500];

  function evalF(x) {
    let v = evalPoly(coeffs, x);
    if(factor) v *= coeffLeadValue(factor);
    return v;
  }

  const fL1 = evalF(-100), fL2 = evalF(-500);
  const fR1 = evalF(100),  fR2 = evalF(500);

  const limL = computeLimit('left');
  const limR = computeLimit('right');

  function testRow(x, fval) {
    return `
      <div style="margin-bottom:8px;">
        <div>Testeinsetzung mit \\(x = ${x}\\)</div>
        <div class="scale-wrapper" style="margin-top:2px;">
          <div class="scale-el">$$f(${x}) \\approx ${formatSci(fval)}$$</div>
        </div>
        <div style="margin-top:2px;">${getDirection(fval)}</div>
      </div>`;
  }

  const html = `
    <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
      <thead>
        <tr><td colspan="2" style="border-top:2px solid black;"></td></tr>
        <tr>
          <th style="text-align:center; border-bottom:2px solid black; border-right:2px solid black; padding:8px;">Für \\(x \\to -\\infty\\)</th>
          <th style="text-align:center; border-bottom:2px solid black; padding:8px;">Für \\(x \\to +\\infty\\)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="padding:8px; vertical-align:top; border-right:2px solid black;">
            ${testRow(-100, fL1)}
            ${testRow(-500, fL2)}
            <div style="margin-top:4px;">d.h. vermutlich: \\(f(x) \\to ${limL}\\)</div>
          </td>
          <td style="padding:8px; vertical-align:top;">
            ${testRow(100, fR1)}
            ${testRow(500, fR2)}
            <div style="margin-top:4px;">d.h. vermutlich: \\(f(x) \\to ${limR}\\)</div>
          </td>
        </tr>
      </tbody>
    </table>
  `;

  document.getElementById('explanation').innerHTML = html;
  MathJax.typesetPromise().then(() => scaleAllElements());
}

function showArgument() {
  const { degree, leadPositive, coeffs, factor, isPure } = currentTask;

  const factorPositive   = factor ? !coeffIsNegative(factor) : true;
  const effectivePositive = leadPositive === factorPositive;
  const isEven = degree % 2 === 0;

  const limL = computeLimit('left');
  const limR = computeLimit('right');

  const leadCoeff = coeffs[0];
  const leadStr   = coeffToString(leadCoeff, false);

  // Satz 1: Grad
  const gradSatz = isEven
    ? `Der Grad des Polynoms ist \\(${degree}\\) (gerade), daher ist das Grenzverhalten für \\(x\\to-\\infty\\) und \\(x\\to+\\infty\\) gleichartig.`
    : `Der Grad des Polynoms ist \\(${degree}\\) (ungerade), daher ist das Grenzverhalten für \\(x\\to-\\infty\\) und \\(x\\to+\\infty\\) entgegengesetzt.`;

  // Satz 2: Leitkoeffizient — nur Spiegelung, kein "daher gilt"-Teil
  let leitSatz;
  if(leadPositive) {
    leitSatz = isEven
      ? `Der Leitkoeffizient \\(${leadStr}\\) ist positiv, daher wurde der Graph nicht gespiegelt. Das Grenzverhalten ist auf der rechten Seite (für \\(x\\to+\\infty\\)) positiv und auf der linken Seite (für \\(x\\to-\\infty\\)) ebenfalls positiv.`
      : `Der Leitkoeffizient \\(${leadStr}\\) ist positiv, daher wurde der Graph nicht gespiegelt. Das Grenzverhalten ist auf der rechten Seite (für \\(x\\to+\\infty\\)) positiv und (wegen dem ungeraden Grad) auf der linken Seite (für \\(x\\to-\\infty\\)) negativ.`;
  } else {
    leitSatz = isEven
      ? `Der Leitkoeffizient \\(${leadStr}\\) ist negativ, d.h. der Graph ist vertikal an der \\(x\\)-Achse gespiegelt. Das Grenzverhalten ist auf der rechten Seite (für \\(x\\to+\\infty\\)) negativ und auf der linken Seite (für \\(x\\to-\\infty\\)) ebenfalls negativ.`
      : `Der Leitkoeffizient \\(${leadStr}\\) ist negativ, d.h. der Graph ist vertikal an der \\(x\\)-Achse gespiegelt. Das Grenzverhalten ist auf der rechten Seite (für \\(x\\to+\\infty\\)) negativ und (wegen dem ungeraden Grad) auf der linken Seite (für \\(x\\to-\\infty\\)) positiv.`;
  }

  // Satz 3: Extra-Faktor (nur wenn vorhanden)
  let factorSatz = '';
  if(factor) {
    const factStr = coeffToString(factor, false);
    if(factorPositive) {
      factorSatz = `<div style="margin-top:6px;">Hier gibt es sogar noch einen weiteren Faktor \\(${factStr}\\) vor der Funktion, dieser ist aber positiv und verändert nichts am Grenzverhalten.</div>`;
    } else {
      factorSatz = `<div style="margin-top:6px;">Hier gibt es sogar noch einen weiteren Faktor \\(${factStr}\\) vor der Funktion, dieser ist hier sogar negativ und dreht daher nochmal alle Vorzeichen um.</div>`;
    }
  }

  // Leitterm-String für Formel
  const leadTermPow = degree === 1 ? 'x' : `x^{${degree}}`;
  const leadTermStr = (() => {
    const cs = coeffToString(leadCoeff, degree > 0);
    if(cs === '') return leadTermPow;
    if(cs === '-') return `-${leadTermPow}`;
    return `${cs}${leadTermPow}`;
  })();

  // Formel-Darstellung: mit oder ohne Extra-Faktor
  function buildFormula(lim, polyStr) {
    const tail = isPure ? '' : ' + \\ldots';
    if(factor) {
      const factStr  = coeffToString(factor, false);
      const factSign = factorPositive ? '{>0}' : '{<0}';
      return `f(x) = \\underbrace{${factStr}}_{\\displaystyle ${factSign}} \\cdot \\left(\\underbrace{${polyStr}}_{\\displaystyle \\to ${lim}}${tail}\\right) \\quad\\to ${lim}`;
    } else {
      return `f(x) = \\underbrace{${polyStr}}_{\\displaystyle \\to ${lim}}${tail} \\quad\\to ${lim}`;
    }
  }

  const html = `
    <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
      <thead>
        <tr><td colspan="2" style="border-top:2px solid black;"></td></tr>
        <tr>
          <th colspan="2" style="text-align:left; border-bottom:2px solid black; padding:8px; font-weight:normal;">
            <div style="margin-bottom:6px;">${gradSatz}</div>
            <div style="margin-bottom:${factor ? '0' : '0'}px;">${leitSatz}</div>
            ${factorSatz}
          </th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="padding:8px; vertical-align:top; border-right:2px solid black;">
            <div class="scale-wrapper">
              <div class="scale-el">$$${buildFormula(limL, leadTermStr)}$$</div>
            </div>
          </td>
          <td style="padding:8px; vertical-align:top;">
            <div class="scale-wrapper">
              <div class="scale-el">$$${buildFormula(limR, leadTermStr)}$$</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  `;

  document.getElementById('explanation').innerHTML = html;
  MathJax.typesetPromise().then(() => scaleAllElements());
}

// ---------------- Skizze ----------------
function updateSketch() {
  if(!currentTask) return;
  const limL = computeLimit('left');  // '+\\infty' oder '-\\infty'
  const limR = computeLimit('right');
  const left  = limL.includes('+') ? 'p' : 'n';
  const right = limR.includes('+') ? 'p' : 'n';
  const filename = `GrenzwertSkizzen/${left}${right}_limit.png`;
  document.getElementById('sketchImg').src = filename;
  // Skizze-Details schließen bei neuer Aufgabe
  document.getElementById('sketchDetails').open = false;
}

// ---------------- Tick-Labels für Grad-Slider dynamisch ----------------
function updateDegTickLabels() {
  const slider = document.getElementById('maxDegree');
  const min = parseInt(slider.min);
  const max = parseInt(slider.max);
  const container = document.getElementById('degTickLabels');
  container.innerHTML = '';
  for(let i = min; i <= max; i++) {
    const span = document.createElement('span');
    span.textContent = i;
    container.appendChild(span);
  }
}

// ---------------- URL-Parameter ----------------
function saveSettingsToURL() {
  const url = new URL(window.location);
  url.searchParams.set('funcType',  document.querySelector('input[name="funcType"]:checked').value);
  url.searchParams.set('degree',    document.getElementById('maxDegree').value);
  url.searchParams.set('leadSign',  document.querySelector('input[name="leadSign"]:checked').value);
  url.searchParams.set('decimals',  document.getElementById('allowDecimals').checked ? '1' : '0');
  url.searchParams.set('fractions', document.getElementById('allowFractions').checked ? '1' : '0');
  url.searchParams.set('factor',    document.getElementById('allowFactor').checked ? '1' : '0');
  url.searchParams.set('explanationMode', document.getElementById('explanationModeSwitch').checked ? 'test' : 'argument');
  window.history.replaceState({}, '', url);
}

function loadSettingsFromURL() {
  const url = new URL(window.location);
  if(url.searchParams.has('funcType')) {
    const v = url.searchParams.get('funcType');
    const r = document.querySelector(`input[name="funcType"][value="${v}"]`);
    if(r) r.checked = true;
  }
  if(url.searchParams.has('degree')) {
    document.getElementById('maxDegree').value = url.searchParams.get('degree');
  }
  if(url.searchParams.has('leadSign')) {
    const v = url.searchParams.get('leadSign');
    const r = document.querySelector(`input[name="leadSign"][value="${v}"]`);
    if(r) r.checked = true;
  }
  if(url.searchParams.has('decimals'))  document.getElementById('allowDecimals').checked  = url.searchParams.get('decimals')  === '1';
  if(url.searchParams.has('fractions')) document.getElementById('allowFractions').checked = url.searchParams.get('fractions') === '1';
  if(url.searchParams.has('factor'))    document.getElementById('allowFactor').checked    = url.searchParams.get('factor')    === '1';
  if(url.searchParams.get('explanationMode') === 'test') {
    document.getElementById('explanationModeSwitch').checked = true;
  }
  updateParams();
  setupChoices();
}

function updateParams() {
  const funcType = document.querySelector('input[name="funcType"]:checked').value;
  const slider   = document.getElementById('maxDegree');
  const degBlock = document.getElementById('degreeBlock');
  const sliderWrap = slider.closest('.slider-wrap');

  const wasPower = slider.disabled;

  if(funcType === 'power' || funcType === 'powerWithFactor') {
    if(!wasPower) {
      // Gerade erst auf Potenz gewechselt → Poly-Wert merken
      slider.dataset.prevValue = slider.value;
    }
    slider.max   = 10;
    slider.value = 10;
    slider.disabled = true;
    if(sliderWrap) sliderWrap.style.opacity = '0.4';
    document.getElementById('degreeDisplay').style.opacity = '0.4';
  } else {
    if(wasPower) {
      // Gerade erst zurück auf Poly gewechselt → gespeicherten Wert wiederherstellen
      slider.max = 6;
      const prev = parseInt(slider.dataset.prevValue);
      slider.value = (prev >= 1 && prev <= 6) ? prev : 4;
      slider.dataset.prevValue = '';
    } else {
      slider.max = 6;
    }
    slider.disabled = false;
    if(sliderWrap) sliderWrap.style.opacity = '';
    document.getElementById('degreeDisplay').style.opacity = '';
  }

  document.getElementById('degreeDisplay').textContent = slider.value;
  updateDegTickLabels();
  saveSettingsToURL();
}

// ---------------- Event Listener ----------------
document.addEventListener('DOMContentLoaded', function() {
  const details = document.getElementById('explanationDetails');
  if(details) {
    details.addEventListener('toggle', function() {
      if(this.open && currentTask) updateExplanation();
    });
  }
});

window.onload = () => {
  loadSettingsFromURL();
  updateDegTickLabels();
  MathJax.startup.promise.then(() => newTask());
};
</script>
