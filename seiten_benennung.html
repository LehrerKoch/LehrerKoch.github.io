<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiten im rechtwinkligen Dreieck – Benennung</title>
<link rel="stylesheet" href="styles.css">
 <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5K8WYYXDL2"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5K8WYYXDL2');
  </script>

<style>
button { align-self: flex-start; margin-top: 15px; padding: 5px; cursor: pointer; border: 2px solid #1f6b24; border-radius: 8px; font-size: 1em; transition: border-color 0.15s, filter 0.15s; }
button:hover { filter: brightness(0.93); border-color: #0e4511; }

/* radio row */
.radio-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0 2px 10px; }
.radio-row label { display: flex; align-items: center; gap: 4px; padding: 2px 10px; border: 1.5px solid #bbb; border-radius: 20px; cursor: pointer; font-size: 0.93em; }
.radio-row input[type=radio] { margin: 0; }

/* func-row (checkboxes like radio-row) */
.func-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0 2px 10px; }
.func-row label { display: flex; align-items: center; gap: 4px; padding: 2px 10px; border: 1.5px solid #bbb; border-radius: 20px; cursor: pointer; font-size: 0.93em; }
.func-row input[type=checkbox] { margin: 0; }

/* type-block */
.type-block { border: 1px solid #c8d8c8; border-radius: 6px; margin: 5px 0; overflow: hidden; }
.type-block-header { background: #eaf2ea; padding: 5px 10px; border-bottom: 1px solid #c8d8c8; }
.type-block-header label { display: flex; align-items: center; gap: 7px; font-weight: bold; cursor: pointer; margin: 0; color: #1a4a1a; }
.type-block-header input[type=checkbox] { margin: 0; }

/* sketch */
.sketch-outer { display: flex; flex-direction: column; align-items: center; margin: 0; }
.sketch-note { font-size: 0.78em; font-style: italic; color: #aaa; margin-bottom: 1px; align-self: flex-start; margin-left: 8px; }
.sketch-svg-wrap { display: flex; justify-content: center; width: 100%; }

/* SVG: max height so it never pushes buttons off screen */
.sketch-svg-wrap svg { width: 100%; max-width: 460px; max-height: 38vh; height: auto; display: block; margin: 0 auto; }

/* task text */
#task-text { font-size: 1.2em; margin: 6px 0 4px 0; line-height: 1.5; }

/* answer buttons */
#answer-area { margin: 6px 0 4px 0; }
.ans-btn {
  padding: 8px 22px; border: 1.5px solid #aaa; border-radius: 20px;
  background: #f7f7f7; cursor: pointer; font-size: 1.05em;
  font-family: Calibri, sans-serif; transition: background 0.15s, border-color 0.15s;
  color: #111; font-weight: 500; margin: 4px 6px 4px 0;
}
.ans-btn:hover:not(.q-correct):not(.q-wrong) { background: #e8f0e8; border-color: #888; }
.ans-btn.q-correct { background: #c8f0c8; border-color: #4a9a4a; color: #1a4a1a; }
.ans-btn.q-wrong   { background: #f8d8d8; border-color: #c04040; color: #6a0000; }

#feedback { font-size: 1.1em; margin: 4px 0 2px 0; min-height: 1.4em; font-weight: bold; }
#feedback.correct { color: #1a7a1a; }
#feedback.wrong   { color: #c04040; }
h1 { margin: 6px 0 4px 0; font-size: 1.5em; }
h2 { margin: 6px 0 2px 0; font-size: 1.15em; }

/* === Typ 3: fraction inside answer button === */
.fi {
  display: inline-flex; flex-direction: column; align-items: center;
  vertical-align: middle; line-height: 1.2; gap: 0;
}
.fi-n {
  border-bottom: 1.5px solid currentColor;
  padding: 0 5px 2px; font-style: italic; font-family: Georgia, serif;
}
.fi-d {
  padding: 2px 5px 0; font-style: italic; font-family: Georgia, serif;
}

/* === Typ 4: big fraction display === */
.frac-big-wrap {
  display: flex; justify-content: center; margin: 8px 0 14px;
}
.frac-big {
  display: inline-flex; flex-direction: column; align-items: center;
  font-family: Georgia, serif; font-style: italic; font-size: 2em;
  border: 1px solid #ccc; border-radius: 8px;
  padding: 6px 20px; background: #f9f9f9;
}
.fb-n {
  border-bottom: 2px solid #333; padding: 0 10px 4px;
}
.fb-d {
  padding: 4px 10px 0;
}

/* === Typ 4: checkbox options === */
.t4-options { display: grid; gap: 6px; margin: 8px 0 12px; }
/* columns set dynamically via inline style to match number of angles */
.t4-option {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 16px; border: 1.5px solid #bbb; border-radius: 20px;
  cursor: pointer; font-size: 1em; background: #f7f7f7;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}
.t4-option:has(input:checked):not(.t4-ok):not(.t4-missed):not(.t4-wrong) {
  background: #d8e8d8; border-color: #5a9a5a;
}
.t4-option:hover:not(.t4-ok):not(.t4-missed):not(.t4-wrong) {
  background: #e8f0e8; border-color: #888;
}
.t4-option input[type=checkbox] { margin: 0; cursor: pointer; }
.t4-option.t4-ok     { background: #c8f0c8; border-color: #4a9a4a; color: #1a4a1a; }
.t4-option.t4-missed { background: #fff3c8; border-color: #c8a000; color: #5a4000; }
.t4-option.t4-wrong  { background: #f8d8d8; border-color: #c04040; color: #6a0000; }

.pruef-btn {
  display: block; margin-top: 2px;
  padding: 8px 24px; background: #eaf2ea;
  border: 1.5px solid #4a9a4a !important; border-radius: 20px;
  cursor: pointer; font-size: 1em; color: #1a4a1a; font-weight: 500;
  transition: background 0.15s; filter: none !important;
}
.pruef-btn:hover:not(:disabled) { background: #cfe8cf; border-color: #2a7a2a !important; filter: none !important; }
.pruef-btn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<h1>Seiten im rechtwinkligen Dreieck benennen</h1>

<details id="settingsDetails">
<summary>Einstellungen</summary>

<div class="form-block">
  <b>Aufgabenformat</b>
  <div class="radio-row">
    <label><input type="radio" name="taskFormat" value="sketch"> Skizze</label>
    <label><input type="radio" name="taskFormat" value="random" checked> Zufällig</label>
    <label><input type="radio" name="taskFormat" value="text"> Textform</label>
  </div>
</div>

<div class="form-block">
  <b>Bezeichnungen</b>
  <div class="radio-row">
    <label><input type="radio" name="labeling" value="abc" checked> Klassisch – Dreieck ABC (a,b,c)</label>
    <label><input type="radio" name="labeling" value="rand"> Zufällige Eckenbezeichnung</label>
  </div>
</div>

<div class="form-block">
  <b>Position des rechten Winkels</b>
  <div class="radio-row">
    <label><input type="radio" name="raPos" value="random" checked> Zufällig</label>
    <label><input type="radio" name="raPos" value="gamma"> Oben (bei C / γ)</label>
    <label><input type="radio" name="raPos" value="alpha"> Links (bei A / α)</label>
    <label><input type="radio" name="raPos" value="beta"> Rechts (bei B / β)</label>
  </div>
</div>

<div class="form-block">
  <b>Aufgabentyp</b>
  <div class="type-block">
    <div class="type-block-header">
      <label><input type="checkbox" id="useType1" checked> Typ 1: Welche Seite ist die [Ankathete|Gegenkathete|Hypotenuse]?</label>
    </div>
  </div>
  <div class="type-block">
    <div class="type-block-header">
      <label><input type="checkbox" id="useType2" checked> Typ 2: Die Seite [a|b|c] ist für den Winkel [α|β] die …?</label>
    </div>
  </div>
  <div class="type-block">
    <div class="type-block-header">
      <label><input type="checkbox" id="useType3" checked> Typ 3: Gib einen Term für den [Sinus|Kosinus|…] von [α|β] an.</label>
    </div>
  </div>
  <div class="type-block">
    <div class="type-block-header">
      <label><input type="checkbox" id="useType4" checked> Typ 4: Welche Winkelbeziehung ist hier abgebildet? (Seite/Seite)</label>
    </div>
  </div>
</div>

<div class="form-block">
  <b>Winkelfunktionen <span style="font-weight:normal;color:#666;">(Typ 3 &amp; 4)</span></b>
  <div class="func-row">
    <label><input type="checkbox" id="useF_sin" checked> Sinus</label>
    <label><input type="checkbox" id="useF_cos" checked> Kosinus</label>
    <label><input type="checkbox" id="useF_tan" checked> Tangens</label>
    <label><input type="checkbox" id="useF_cot"> Kotangens</label>
    <label><input type="checkbox" id="useF_sec"> Sekans</label>
    <label><input type="checkbox" id="useF_csc"> Kosekans</label>
  </div>
</div>

</details>

<button onclick="newTask()">Neue Aufgabe</button>

<h2>Aufgabe</h2>

<div id="sketch-direct-wrap" style="display:none">
  <div class="sketch-outer">
    <div class="sketch-svg-wrap" id="sketch-direct"></div>
  </div>
</div>

<div id="text-task-wrap" style="display:none">
  <div id="task-text"></div>
  <details id="sketch-collapsible">
    <summary>Skizze anzeigen</summary>
    <div class="sketch-outer">
      <div class="sketch-svg-wrap" id="sketch-inside"></div>
    </div>
  </details>
</div>

<div id="answer-area"></div>
<div id="feedback"></div>

<script>
// ================================================================
// HELPERS
// ================================================================
const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const f1 = v => (+v).toFixed(1);
const pick = arr => arr[randInt(0, arr.length-1)];
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]];} return a; };

// ================================================================
// NAMING
// ================================================================
function genNaming(labeling) {
  if (labeling === 'abc') {
    return { V1:'A', V2:'B', V3:'C',
             s1:'a', s2:'b', s3:'c',
             ang1:'α', ang2:'β', ang3:'γ' };
  }
  const pool = 'DEFGHIJKLMNPQRSTUVWXYZ'.split('');
  const picked = [];
  while (picked.length < 3) picked.push(pool.splice(randInt(0,pool.length-1),1)[0]);
  const [P,Q,R] = picked;
  return { V1:P, V2:Q, V3:R,
           s1:P.toLowerCase(), s2:Q.toLowerCase(), s3:R.toLowerCase(),
           ang1:`∢${P}`, ang2:`∢${Q}`, ang3:`∢${R}` };
}

function sideName(key, nm) {
  return {a:nm.s1, b:nm.s2, c:nm.s3}[key];
}
function angName(key, nm) {
  return {alpha:nm.ang1, beta:nm.ang2, gamma:nm.ang3}[key];
}

// ================================================================
// TRIANGLE GEOMETRY
// ================================================================
function getRoles(raWinkel) {
  if (raWinkel === 'gamma') {
    return { hyp:'c', ra:'gamma',
             activeAngles: [
               { key:'alpha', GK:'a', AK:'b' },
               { key:'beta',  GK:'b', AK:'a' }
             ]};
  } else if (raWinkel === 'alpha') {
    return { hyp:'a', ra:'alpha',
             activeAngles: [
               { key:'beta',  GK:'b', AK:'c' },
               { key:'gamma', GK:'c', AK:'b' }
             ]};
  } else {
    return { hyp:'b', ra:'beta',
             activeAngles: [
               { key:'alpha', GK:'a', AK:'c' },
               { key:'gamma', GK:'c', AK:'a' }
             ]};
  }
}

// ================================================================
// SVG SKETCH
// ================================================================
function buildSVG(raWinkel, nm) {
  const shapes = [
    {k1:3,k2:4}, {k1:5,k2:12}, {k1:20,k2:21}, {k1:1,k2:1}
  ];
  const sh = pick(shapes);
  const maxS = Math.max(sh.k1,sh.k2);
  let k1 = sh.k1/maxS, k2 = sh.k2/maxS;

  const mirror = Math.random() < 0.5;
  if (mirror) { const tmp=k1; k1=k2; k2=tmp; }

  const SCALE = 160;
  const PAD = 60;

  let pR, pX, pY;
  if (raWinkel === 'gamma') {
    pR = [PAD, PAD];
    pX = [PAD + k1*SCALE, PAD];
    pY = [PAD, PAD + k2*SCALE];
  } else if (raWinkel === 'alpha') {
    pR = [PAD, PAD + k2*SCALE];
    pX = [PAD + k1*SCALE, PAD + k2*SCALE];
    pY = [PAD, PAD];
  } else {
    pR = [PAD + k1*SCALE, PAD + k2*SCALE];
    pX = [PAD, PAD + k2*SCALE];
    pY = [PAD + k1*SCALE, PAD];
  }

  let pA, pB, pC;
  if (raWinkel === 'gamma') {
    pC = pR; pA = pX; pB = pY;
  } else if (raWinkel === 'alpha') {
    pA = pR; pB = pX; pC = pY;
  } else {
    pB = pR; pA = pX; pC = pY;
  }

  const allX = [pA[0],pB[0],pC[0]];
  const allY = [pA[1],pB[1],pC[1]];
  const svgW = Math.max(...allX) + PAD;
  const svgH = Math.max(...allY) + PAD;

  const cx = (pA[0]+pB[0]+pC[0])/3;
  const cy = (pA[1]+pB[1]+pC[1])/3;

  function n2l(x,y) { const l=Math.sqrt(x*x+y*y)||1; return [x/l,y/l]; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  const rotDeg = randInt(-20, 20);

  function ln([x1,y1],[x2,y2],col,w) {
    return `<line x1="${f1(x1)}" y1="${f1(y1)}" x2="${f1(x2)}" y2="${f1(y2)}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`;
  }

  const COL_RA = '#3a8858';
  function raMarker([Cx,Cy],[Ax,Ay],[Bx,By]) {
    const [u1x,u1y]=n2l(Ax-Cx,Ay-Cy), [u2x,u2y]=n2l(Bx-Cx,By-Cy);
    const r = 18;
    const a1 = Math.atan2(u1y,u1x), a2 = Math.atan2(u2y,u2x);
    let d = a2 - a1;
    while(d > Math.PI) d -= 2*Math.PI;
    while(d < -Math.PI) d += 2*Math.PI;
    const midA0 = a1 + d/2;
    const testX = Cx + r*1.4*Math.cos(midA0), testY = Cy + r*1.4*Math.sin(midA0);
    if ((cx-Cx)*(testX-Cx)+(cy-Cy)*(testY-Cy) < 0)
      d = d > 0 ? d - 2*Math.PI : d + 2*Math.PI;
    const sx = Cx + r*Math.cos(a1), sy = Cy + r*Math.sin(a1);
    const ex = Cx + r*Math.cos(a1+d), ey = Cy + r*Math.sin(a1+d);
    const sweep = d > 0 ? 1 : 0;
    const midA = a1 + d/2;
    const dotX = Cx + r*0.6*Math.cos(midA), dotY = Cy + r*0.6*Math.sin(midA);
    return `<path d="M ${f1(sx)} ${f1(sy)} A ${r} ${r} 0 0 ${sweep} ${f1(ex)} ${f1(ey)}" fill="none" stroke="${COL_RA}" stroke-width="1.7"/>`
         + `<circle cx="${f1(dotX)}" cy="${f1(dotY)}" r="2.5" fill="${COL_RA}"/>`;
  }

  function sideLabel([P1x,P1y],[P2x,P2y],text) {
    const mx=(P1x+P2x)/2, my=(P1y+P2y)/2;
    const [dx,dy]=n2l(mx-cx, my-cy);
    return `<text x="${f1(mx+dx*26)}" y="${f1(my+dy*26)}" fill="#222" font-size="15" font-family="Georgia,serif" font-style="italic" text-anchor="middle" dominant-baseline="middle">${esc(text)}</text>`;
  }

  function vtxLabel([Px,Py],name) {
    const [dx,dy]=n2l(Px-cx, Py-cy);
    return `<text x="${f1(Px+dx*24)}" y="${f1(Py+dy*24)}" fill="#333" font-size="16" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" dominant-baseline="middle">${esc(name)}</text>`;
  }

  function raLabel([Cx,Cy],[Ax,Ay],[Bx,By],text) {
    const [u1x,u1y]=n2l(Ax-Cx,Ay-Cy), [u2x,u2y]=n2l(Bx-Cx,By-Cy);
    const bisX=(u1x+u2x), bisY=(u1y+u2y);
    const [bx,by]=n2l(bisX,bisY);
    const intoX=(cx-Cx)*bx+(cy-Cy)*by;
    const fx=intoX>=0?bx:-bx, fy=intoX>=0?by:-by;
    return `<text x="${f1(Cx+fx*36)}" y="${f1(Cy+fy*36)}" fill="${COL_RA}" font-size="14" font-family="Georgia,serif" font-style="italic" text-anchor="middle" dominant-baseline="middle">${esc(text)}</text>`;
  }

  const raPt = raWinkel==='alpha'?pA : raWinkel==='beta'?pB : pC;
  const [raOth1, raOth2] = raWinkel==='alpha' ? [pB,pC] : raWinkel==='beta' ? [pA,pC] : [pA,pB];

  const lines = ln(pB,pC,'#444',2) + ln(pA,pC,'#444',2) + ln(pA,pB,'#444',2);
  const raM = raMarker(raPt, raOth1, raOth2);

  const lSa = sideLabel(pB, pC, nm.s1);
  const lSb = sideLabel(pA, pC, nm.s2);
  const lSc = sideLabel(pA, pB, nm.s3);

  const vA = vtxLabel(pA, nm.V1);
  const vB = vtxLabel(pB, nm.V2);
  const vC = vtxLabel(pC, nm.V3);
  const raLbl = raLabel(raPt, raOth1, raOth2, angName(raWinkel, nm) + ' = 90°');

  const RPAD = 30;
  return `<svg viewBox="${-RPAD} ${-RPAD} ${f1(svgW+2*RPAD)} ${f1(svgH+2*RPAD)}" xmlns="http://www.w3.org/2000/svg">
  <g transform="rotate(${rotDeg}, ${f1(svgW/2)}, ${f1(svgH/2)})">
  ${lines}${raM}${lSa}${lSb}${lSc}${vA}${vB}${vC}${raLbl}
  </g>
</svg>`;
}

// ================================================================
// TRIG FUNCTIONS
// ================================================================
const TRIG_FUNCS = [
  { key:'sin', name:'Sinus',     short:'sin', getRatio:(ang,hyp)=>({num:ang.GK, den:hyp       }) },
  { key:'cos', name:'Kosinus',   short:'cos', getRatio:(ang,hyp)=>({num:ang.AK, den:hyp       }) },
  { key:'tan', name:'Tangens',   short:'tan', getRatio:(ang,hyp)=>({num:ang.GK, den:ang.AK    }) },
  { key:'cot', name:'Kotangens', short:'cot', getRatio:(ang,hyp)=>({num:ang.AK, den:ang.GK    }) },
  { key:'sec', name:'Sekans',    short:'sec', getRatio:(ang,hyp)=>({num:hyp,    den:ang.AK    }) },
  { key:'csc', name:'Kosekans',  short:'csc', getRatio:(ang,hyp)=>({num:hyp,    den:ang.GK    }) },
];

function getEnabledFuncs() {
  return TRIG_FUNCS.filter(f => document.getElementById('useF_'+f.key).checked);
}

// Fraction HTML helpers
function fracHTML(numKey, denKey, nm) {
  const n = sideName(numKey, nm);
  const d = sideName(denKey, nm);
  return `<span class="fi"><span class="fi-n">${n}</span><span class="fi-d">${d}</span></span>`;
}

function fracBigHTML(numKey, denKey, nm) {
  const n = sideName(numKey, nm);
  const d = sideName(denKey, nm);
  return `<div class="frac-big-wrap"><span class="frac-big"><span class="fb-n">${n}</span><span class="fb-d">${d}</span></span></div>`;
}

// ================================================================
// TASK GENERATION
// ================================================================
var _current = null;

function newTask() {
  document.getElementById('settingsDetails').removeAttribute('open');

  // Settings
  const labeling = document.querySelector('input[name="labeling"]:checked').value;
  const raPosVal  = document.querySelector('input[name="raPos"]:checked').value;
  const fmtMode   = document.querySelector('input[name="taskFormat"]:checked').value;

  const useType1 = document.getElementById('useType1').checked;
  const useType2 = document.getElementById('useType2').checked;
  const useType3 = document.getElementById('useType3').checked;
  const useType4 = document.getElementById('useType4').checked;
  const enabledFuncs = getEnabledFuncs();

  // Determine valid task types
  const validTypes = [];
  if (useType1) validTypes.push(1);
  if (useType2) validTypes.push(2);
  if (useType3 && enabledFuncs.length > 0) validTypes.push(3);
  if (useType4 && enabledFuncs.length > 0) validTypes.push(4);

  if (validTypes.length === 0) {
    document.getElementById('answer-area').innerHTML =
      '<em>Bitte mindestens einen Aufgabentyp auswählen (Typ 3 & 4 benötigen aktivierte Winkelfunktionen).</em>';
    document.getElementById('feedback').textContent = '';
    return;
  }

  const raWinkel = raPosVal === 'random' ? pick(['alpha','beta','gamma']) : raPosVal;
  const nm     = genNaming(labeling);
  const roles  = getRoles(raWinkel);
  const taskType = pick(validTypes);

  const svgStr = buildSVG(raWinkel, nm);
  const useSketch = fmtMode==='sketch' || (fmtMode==='random' && Math.random()<0.5);

  // Show/hide sketch
  if (useSketch) {
    document.getElementById('sketch-direct-wrap').style.display = '';
    document.getElementById('text-task-wrap').style.display = 'none';
    document.getElementById('sketch-direct').innerHTML = svgStr;
  } else {
    document.getElementById('sketch-direct-wrap').style.display = 'none';
    document.getElementById('text-task-wrap').style.display = '';
    document.getElementById('sketch-inside').innerHTML = svgStr;
    document.getElementById('sketch-collapsible').removeAttribute('open');
  }

  const raAngName = angName(raWinkel, nm);
  let questionHTML = '', answers = [], correctKey = '';

  // ---- Typ 1 ----
  if (taskType === 1) {
    const activeAngle = pick(roles.activeAngles);
    const aktAng = angName(activeAngle.key, nm);
    const roleChoice = pick(['AK','GK','Hyp']);
    let correctSide;
    if (roleChoice==='AK')  correctSide = activeAngle.AK;
    if (roleChoice==='GK')  correctSide = activeAngle.GK;
    if (roleChoice==='Hyp') correctSide = roles.hyp;
    const roleLabel = roleChoice==='AK' ? 'Ankathete' : roleChoice==='GK' ? 'Gegenkathete' : 'Hypotenuse';

    if (useSketch) {
      questionHTML = `Welche Seite ist die <b>${roleLabel}</b> zum Winkel <b>${aktAng}</b>?`;
    } else {
      questionHTML = `Im Dreieck △${nm.V1}${nm.V2}${nm.V3} mit dem rechten Winkel bei <b>${raAngName}</b>:<br>
        Welche Seite ist die <b>${roleLabel}</b> zum Winkel <b>${aktAng}</b>?`;
    }
    correctKey = correctSide;
    answers = shuffle(['a','b','c'].map(k => ({
      key: k, label: sideName(k,nm), correct: k===correctSide, isFrac:false
    })));

  // ---- Typ 2 ----
  } else if (taskType === 2) {
    const activeAngle = pick(roles.activeAngles);
    const aktAng = angName(activeAngle.key, nm);
    const sideKey = pick(['a','b','c']);
    const sName = sideName(sideKey, nm);
    let correctRole;
    if (sideKey===roles.hyp)           correctRole='Hyp';
    else if (sideKey===activeAngle.GK) correctRole='GK';
    else if (sideKey===activeAngle.AK) correctRole='AK';
    else correctRole='Hyp';

    if (useSketch) {
      questionHTML = `Die Seite <b>${sName}</b> ist für den Winkel <b>${aktAng}</b> die …?`;
    } else {
      questionHTML = `Im Dreieck △${nm.V1}${nm.V2}${nm.V3} mit dem rechten Winkel bei <b>${raAngName}</b>:<br>
        Die Seite <b>${sName}</b> ist für den Winkel <b>${aktAng}</b> die …?`;
    }
    correctKey = correctRole;
    answers = shuffle([
      { key:'AK',  label:`Ankathete von ${aktAng}`,    correct: correctRole==='AK',  isFrac:false },
      { key:'GK',  label:`Gegenkathete von ${aktAng}`, correct: correctRole==='GK',  isFrac:false },
      { key:'Hyp', label:'Hypotenuse',                  correct: correctRole==='Hyp', isFrac:false }
    ]);

  // ---- Typ 3 ----
  } else if (taskType === 3) {
    // Pool: all (func, angle) combinations
    const pool = [];
    for (const ang of roles.activeAngles)
      for (const f of enabledFuncs)
        pool.push({ func:f, angle:ang });

    const chosen = pick(pool);
    const { func, angle } = chosen;
    const aktAng = angName(angle.key, nm);
    const correctRatio = func.getRatio(angle, roles.hyp);
    const correctStr = correctRatio.num + '/' + correctRatio.den;

    if (useSketch) {
      questionHTML = `Gib einen Term für den <b>${func.name}</b> von <b>${aktAng}</b> an:`;
    } else {
      questionHTML = `Im Dreieck △${nm.V1}${nm.V2}${nm.V3} mit dem rechten Winkel bei <b>${raAngName}</b>:<br>
        Gib einen Term für den <b>${func.name}</b> von <b>${aktAng}</b> an:`;
    }

    // All 6 ordered pairs in fixed order: a/b, a/c, b/a, b/c, c/a, c/b
    const allPairs = [
      {num:'a',den:'b'}, {num:'a',den:'c'},
      {num:'b',den:'a'}, {num:'b',den:'c'},
      {num:'c',den:'a'}, {num:'c',den:'b'}
    ];

    correctKey = correctStr;
    answers = allPairs.map(r => ({
      ratio: r,
      correct: r.num+'/'+r.den === correctStr,
      isFrac: true
    }));

  // ---- Typ 4 ----
  } else {
    // All 6 ordered side pairs
    const allPairs = [];
    for (const n of ['a','b','c'])
      for (const d of ['a','b','c'])
        if (n!==d) allPairs.push({num:n, den:d});

    // Only pick ratios that have at least one enabled match
    const validPairs = allPairs.filter(pair =>
      roles.activeAngles.some(ang =>
        enabledFuncs.some(f => {
          const r = f.getRatio(ang, roles.hyp);
          return r.num===pair.num && r.den===pair.den;
        })
      )
    );
    const chosenRatio = pick(validPairs.length > 0 ? validPairs : allPairs);

    // Build checkbox options for ALL THREE angles
    // Active (non-right) angles: compute ratio and check correctness
    // Right angle: always incorrect (sin/cos/tan of 90° are not ratios of two distinct sides)
    const t4Options = [];
    for (const ang of roles.activeAngles)
      for (const f of enabledFuncs) {
        const r = f.getRatio(ang, roles.hyp);
        t4Options.push({
          func:f, angle:ang,
          correct: r.num===chosenRatio.num && r.den===chosenRatio.den
        });
      }
    // Right angle options — always wrong
    for (const f of enabledFuncs)
      t4Options.push({ func:f, angle:{ key: raWinkel }, correct: false });

    if (useSketch) {
      questionHTML = `Welche Winkelbeziehung(en) wird durch diesen Ausdruck beschrieben?<br>Kreuze alle richtigen Möglichkeiten an.`;
    } else {
      questionHTML = `Im Dreieck △${nm.V1}${nm.V2}${nm.V3} mit dem rechten Winkel bei <b>${raAngName}</b>:<br>
        Welche Winkelbeziehung(en) wird durch diesen Ausdruck beschrieben? Kreuze alle richtigen Möglichkeiten an.`;
    }

    _current = { taskType:4, nm, raWinkel, roles, chosenRatio };

    // Render task text
    const taskDiv = document.getElementById('task-text');
    if (!useSketch) taskDiv.innerHTML = questionHTML;
    else taskDiv.innerHTML = '';

    // Build answer area
    const answerArea = document.getElementById('answer-area');
    let html = '';
    if (useSketch) {
      html += `<div style="font-size:1.1em;margin:8px 0 4px 0;line-height:1.5;">${questionHTML}</div>`;
    }

    // Big fraction display
    html += fracBigHTML(chosenRatio.num, chosenRatio.den, nm);

    // Checkboxes: grid with func as rows, angles as columns
    // Column order always: alpha, beta, gamma (fixed, regardless of right angle)
    const colAngles = ['alpha','beta','gamma'].map(k => ({ key: k }));
    const nCols = colAngles.length; // always 3

    html += `<div class="t4-options" style="grid-template-columns:repeat(${nCols},auto);">`;
    for (const f of enabledFuncs) {
      for (const ang of colAngles) {
        // find matching option (active angles have an entry; right angle was added separately)
        const opt = t4Options.find(o => o.func.key===f.key && o.angle.key===ang.key);
        const correct = opt ? opt.correct : false;
        const angN = angName(ang.key, nm);
        const label = `${f.short}(${angN})`;
        html += `<label class="t4-option" data-correct="${correct?'1':'0'}">
          <input type="checkbox" class="t4-cb"> ${label}
        </label>`;
      }
    }
    html += '</div>';
    html += '<button class="pruef-btn" onclick="checkType4()">Prüfen</button>';

    answerArea.innerHTML = html;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = '';
    return; // early return — Typ 4 has its own rendering
  }

  // ---- Render for Typ 1, 2, 3 (single-select buttons) ----
  _current = { taskType, correctKey, nm, raWinkel, roles };

  const taskDiv = document.getElementById('task-text');
  if (!useSketch) taskDiv.innerHTML = questionHTML;
  else taskDiv.innerHTML = '';

  const answerArea = document.getElementById('answer-area');
  let html = '';
  if (useSketch) {
    html += `<div style="font-size:1.1em;margin:8px 0 10px 0;line-height:1.5;">${questionHTML}</div>`;
  }
  html += '<div>';
  answers.forEach(ans => {
    const btnKey  = ans.isFrac ? ans.ratio.num+'/'+ans.ratio.den : ans.key;
    const btnLabel = ans.isFrac ? fracHTML(ans.ratio.num, ans.ratio.den, nm) : ans.label;
    html += `<button class="ans-btn" data-key="${btnKey}" data-correct="${ans.correct?'1':'0'}" onclick="checkAnswer(this)">${btnLabel}</button>`;
  });
  html += '</div>';
  answerArea.innerHTML = html;

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
}

// ================================================================
// CHECK ANSWER (Typ 1, 2, 3 — single select)
// ================================================================
function checkAnswer(btn) {
  const area = document.getElementById('answer-area');
  if (area.querySelector('.q-correct')) return;

  const correct = btn.dataset.correct === '1';
  if (correct) {
    btn.classList.add('q-correct');
    area.querySelectorAll('.ans-btn').forEach(b => { if(b!==btn) b.disabled=true; });
    document.getElementById('feedback').textContent = '✓ Richtig!';
    document.getElementById('feedback').className = 'correct';
  } else {
    btn.classList.add('q-wrong');
    btn.disabled = true;
    document.getElementById('feedback').textContent = '✗ Leider falsch – versuch es nochmal!';
    document.getElementById('feedback').className = 'wrong';
  }
}

// ================================================================
// CHECK ANSWER (Typ 4 — multi-select)
// ================================================================
function checkType4() {
  const area = document.getElementById('answer-area');

  // Lock all checkboxes and the Prüfen button
  area.querySelectorAll('.t4-cb').forEach(cb => cb.disabled = true);
  const pruefBtn = area.querySelector('.pruef-btn');
  if (pruefBtn) pruefBtn.disabled = true;

  let allCorrect = true;

  area.querySelectorAll('.t4-option').forEach(lbl => {
    const cb = lbl.querySelector('.t4-cb');
    const isCorrect = lbl.dataset.correct === '1';
    const isChecked = cb.checked;

    if (isCorrect && isChecked) {
      lbl.classList.add('t4-ok');       // checked + correct → green
    } else if (isCorrect && !isChecked) {
      lbl.classList.add('t4-missed');   // missed correct → yellow
      allCorrect = false;
    } else if (!isCorrect && isChecked) {
      lbl.classList.add('t4-wrong');    // checked + wrong → red
      allCorrect = false;
    }
    // unchecked + incorrect → no class needed (stays neutral)
  });

  const fb = document.getElementById('feedback');
  if (allCorrect) {
    fb.textContent = '✓ Richtig!';
    fb.className = 'correct';
  } else {
    fb.textContent = '✗ Nicht ganz – gelb markierte Antworten wurden vergessen, rot markierte sind falsch.';
    fb.className = 'wrong';
  }
}

loadURL();
newTask();

// ================================================================
// URL PERSISTENCE
// ================================================================
function updateURL() {
  const url = new URL(window.location);
  url.searchParams.set('fmt', document.querySelector('input[name="taskFormat"]:checked').value);
  url.searchParams.set('lbl', document.querySelector('input[name="labeling"]:checked').value);
  url.searchParams.set('rap', document.querySelector('input[name="raPos"]:checked').value);
  url.searchParams.set('t1',  document.getElementById('useType1').checked ? '1' : '0');
  url.searchParams.set('t2',  document.getElementById('useType2').checked ? '1' : '0');
  url.searchParams.set('t3',  document.getElementById('useType3').checked ? '1' : '0');
  url.searchParams.set('t4',  document.getElementById('useType4').checked ? '1' : '0');
  for (const f of TRIG_FUNCS)
    url.searchParams.set('f_'+f.key, document.getElementById('useF_'+f.key).checked ? '1' : '0');
  history.replaceState({}, '', url);
}

function loadURL() {
  const url = new URL(window.location);
  const g = (k, d) => url.searchParams.has(k) ? url.searchParams.get(k) : d;
  const setR = (name, val) => {
    const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
    if (el) el.checked = true;
  };
  setR('taskFormat', g('fmt', 'random'));
  setR('labeling',   g('lbl', 'abc'));
  setR('raPos',      g('rap', 'random'));
  if (url.searchParams.has('t1')) document.getElementById('useType1').checked = g('t1','1') === '1';
  if (url.searchParams.has('t2')) document.getElementById('useType2').checked = g('t2','1') === '1';
  if (url.searchParams.has('t3')) document.getElementById('useType3').checked = g('t3','1') === '1';
  if (url.searchParams.has('t4')) document.getElementById('useType4').checked = g('t4','1') === '1';
  for (const f of TRIG_FUNCS) {
    const k = 'f_' + f.key;
    if (url.searchParams.has(k))
      document.getElementById('useF_'+f.key).checked = url.searchParams.get(k) === '1';
  }
}

document.querySelectorAll('input').forEach(el =>
  el.addEventListener('change', updateURL)
);
