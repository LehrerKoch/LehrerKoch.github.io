<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5K8WYYXDL2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5K8WYYXDL2');
  </script>
  <title>Graphen erkennen</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <style>
    .site-footer {
      width: 100%; box-sizing: border-box; padding: 12px 40px;
      border-top: 1px solid #ccc; margin-top: 20px; margin-bottom: 10px;
      font-family: sans-serif; font-size: 0.6em; color: #333333d8;
    }
    .footer-content {
      display: flex; justify-content: center; align-items: center;
      gap: 1.5rem; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; text-align: center;
    }
    @media (max-width: 600px) { .footer-content { flex-direction: column; gap: 6px; } }

    body { font-family: sans-serif; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
    *:focus { outline: none; }
    #showSolutionBtn:focus { outline: 2px solid black; }

    #flashOverlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0; transition: opacity 1s;
    }
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 12px 24px; border-radius: 10px;
      font-size: 0.95em; opacity: 0; pointer-events: none;
      transition: opacity 0.4s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* Card area — taller to show graph images */
    #taskWrap {
      position: relative; width: 100%; height: 360px; margin-top: 20px;
      border: 1px solid #eee; border-radius: 10px; perspective: 1000px; z-index: 1;
    }
    #wrongBtn, #correctBtn {
      position: absolute; top: 0; bottom: 0; width: 75px;
      border: none; font-size: 0.7em; z-index: 1; cursor: pointer;
    }
    #wrongBtn  { left: 0;  background-color: #f8d7da; color: #721c24; }
    #correctBtn{ right: 0; background-color: #d4edda; color: #155724; }

    #taskCard {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      text-align: center; border-radius: 15px; cursor: grab;
      width: calc(100% - 220px); max-width: 360px; height: 90%;
      z-index: 2; box-sizing: border-box;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    #taskCard.flipped { transform: translate(-50%, -50%) rotateY(180deg); }

    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 2px solid #ddd; border-radius: 15px; background: white;
      transition: background-color 0.2s ease; overflow: hidden;
    }
    .card-back { transform: rotateY(180deg); background-color: #fcfcfc; }

    #cardImage {
      max-width: 100%; max-height: 100%;
      object-fit: contain; pointer-events: none;
    }
    #cardImageBack {
      max-width: 80%; max-height: 75%;
      object-fit: contain; pointer-events: none; opacity: 0.25;
    }
    .card-loesung { font-size: 1.6em; margin-top: 10px; }

    #showSolutionBtn { width: 100%; margin-top: 15px; padding: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="flashOverlay"></div>
  <div id="toast"></div>
  <div style="position:relative; z-index:1;">

  <h1>Graphen zuordnen</h1>
  <p>Gib die passende Funktionsgleichung zum abgebildeten Graphen an.</p>
  <p id="counter" style="font-weight:bold; text-align:center;">Richtig: 0 / 0</p>

  <div id="taskWrap">
    <button id="wrongBtn">Noch unsicher</button>
    <div id="taskCard">
      <div class="card-face" id="faceFront">
        <img id="cardImage" src="" alt="Graph">
      </div>
      <div class="card-face card-back" id="faceBack">
        <img id="cardImageBack" src="" alt="Graph">
        <div id="loesung" class="card-loesung"></div>
      </div>
    </div>
    <button id="correctBtn">Kann ich sicher</button>
  </div>

  <button id="showSolutionBtn" class="btn">Lösung anzeigen</button>

  </div>

<script>
const cards = [
  {img: "static/images/Graphen/1t.png",     loesung: "\\(f(x)=1\\)"},
  {img: "static/images/Graphen/sqrtt.png",  loesung: "\\(f(x)=\\sqrt{x}\\)"},
  {img: "static/images/Graphen/sint.png",   loesung: "\\(f(x)=\\sin(x)\\)"},
  {img: "static/images/Graphen/x2t.png",    loesung: "\\(f(x)=x^2\\)"},
  {img: "static/images/Graphen/x3t.png",    loesung: "\\(f(x)=x^3\\)"},
  {img: "static/images/Graphen/xt.png",     loesung: "\\(f(x)=x\\)"},
  {img: "static/images/Graphen/cost.png",   loesung: "\\(f(x)=\\cos(x)\\)"},
  {img: "static/images/Graphen/lnt.png",    loesung: "\\(f(x)=\\ln(x)\\)"},
  {img: "static/images/Graphen/et.png",     loesung: "\\(f(x)=e^x\\)"},
  {img: "static/images/Graphen/1_xt.png",   loesung: "\\(f(x)=\\frac{1}{x}\\)"},
  {img: "static/images/Graphen/1_x2t.png",  loesung: "\\(f(x)=\\frac{1}{x^2}\\)"},
];

let taskPool = [...cards];
let currentTask = null, correctCount = 0, totalCount = 0, lastTask = null;
let startX = null, currentX = 0, startTime = 0, ignoreMouseUp = false;

const card  = document.getElementById('taskCard');
const faces = document.querySelectorAll('.card-face');
const counterEl = document.getElementById('counter');

function showToast(msg, duration = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function flashResult(color) {
  const ov = document.getElementById('flashOverlay');
  ov.style.transition = 'none';
  ov.style.backgroundColor = color;
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.transition = 'opacity 1s'; ov.style.opacity = '0'; }, 50);
}

function generateTask() {
  if (taskPool.length === 0) {
    taskPool = [...cards];
    showToast('🎉 Alle Karten geschafft! Stapel wird neu gemischt…');
  }
  let idx;
  do { idx = Math.floor(Math.random() * taskPool.length); }
  while (taskPool.length > 1 && taskPool[idx] === lastTask);
  const sel = taskPool[idx];
  lastTask = sel;
  currentTask = { poolIdx: idx, data: sel };
  window.currentSolution = null; // erst nach Flip verfügbar

  // Sofort: Vorderseite befüllen + zurückblättern
  document.getElementById('cardImage').src = sel.img;
  faces.forEach(f => f.style.backgroundColor = 'white');
  card.removeAttribute('style');
  card.classList.remove('flipped');

  // Nach 600ms (Rückseite nicht mehr sichtbar): Rückseite befüllen
  setTimeout(() => {
    document.getElementById('loesung').innerHTML = '';
    document.getElementById('cardImageBack').src = sel.img;
    window.currentSolution = sel.loesung;
    if (window.MathJax) MathJax.typeset();
  }, 600);
}

function showSolution() {
  if (!window.currentSolution) return;
  document.getElementById('loesung').innerHTML = window.currentSolution;
  card.classList.add('flipped');
  if (window.MathJax) MathJax.typeset();
}

function markAnswer(correct) {
  if (!currentTask) return;
  flashResult(correct ? '#d4edda' : '#f8d7da');
  totalCount++;
  if (correct) {
    correctCount++;
    taskPool.splice(currentTask.poolIdx, 1);
  }
  counterEl.textContent = `Richtig: ${correctCount} / ${totalCount}`;
  showSolution();
  currentTask = null;
  setTimeout(generateTask, 1200);
}

card.onmousedown = (e) => { startTime = Date.now(); handleStart(e); };
card.onmouseup   = (e) => {
  if (ignoreMouseUp) { ignoreMouseUp = false; return; }
  const duration = Date.now() - startTime;
  if (duration < 250 && Math.abs(currentX) < 20) {
    startX = null; currentX = 0;
    requestAnimationFrame(() => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      requestAnimationFrame(() => { showSolution(); });
    });
    return;
  }
  handleEnd();
};
card.ontouchstart = (e) => { startTime = Date.now(); handleStart(e); };
card.ontouchend   = (e) => {
  ignoreMouseUp = true;
  const duration = Date.now() - startTime;
  if (duration < 250 && Math.abs(currentX) < 20) {
    startX = null; currentX = 0;
    requestAnimationFrame(() => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      requestAnimationFrame(() => { showSolution(); });
    });
    return;
  }
  handleEnd();
};

const handleStart = (e) => { startX = e.clientX || (e.touches && e.touches[0].clientX); card.style.transition = 'none'; };
const handleMove  = (e) => {
  if (startX === null) return;
  currentX = (e.clientX || (e.touches && e.touches[0].clientX)) - startX;
  const rot = card.classList.contains('flipped') ? 180 : 0;
  card.style.transform = `translate(calc(-50% + ${currentX}px), -50%) rotateY(${rot}deg)`;
  const intensity = Math.min(Math.abs(currentX) / (card.parentElement.offsetWidth * 0.25), 0.8);
  faces.forEach(f => f.style.backgroundColor = currentX > 0 ? `rgba(212,237,218,${intensity})` : `rgba(248,215,218,${intensity})`);
};
const handleEnd = () => {
  if (startX === null) return;
  const threshold = card.parentElement.offsetWidth * 0.25;
  const triggered = currentX > threshold || currentX < -threshold;
  const wasCorrect = currentX > 0;
  faces.forEach(f => f.style.backgroundColor = 'white');
  card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
  if (triggered) {
    markAnswer(wasCorrect);
    requestAnimationFrame(() => {
      card.style.transform = `translate(-50%, -50%) rotateY(${card.classList.contains('flipped') ? 180 : 0}deg)`;
      setTimeout(() => { card.removeAttribute('style'); }, 600);
    });
  } else {
    card.style.transform = `translate(-50%, -50%) rotateY(${card.classList.contains('flipped') ? 180 : 0}deg)`;
    setTimeout(() => { if (startX === null) card.removeAttribute('style'); }, 600);
  }
  startX = null; currentX = 0;
};
document.onmousemove = handleMove;
card.ontouchmove = handleMove;
document.onmouseup = () => { if (startX !== null) handleEnd(); };

document.onkeydown = (e) => {
  if (e.code === 'Space')      { e.preventDefault(); showSolution(); }
  if (e.code === 'ArrowLeft')  markAnswer(false);
  if (e.code === 'ArrowRight') markAnswer(true);
};

document.getElementById('showSolutionBtn').onclick = showSolution;
document.getElementById('wrongBtn').onclick  = () => markAnswer(false);
document.getElementById('correctBtn').onclick = () => markAnswer(true);

generateTask();
</script>

<footer class="site-footer">
  <div class="footer-content">
    M.&nbsp;Koch
    <span class="footer-topic">Mathe-Tools</span>
    <span class="footer-update">Zuletzt aktualisiert:&nbsp;<span id="last-update">...</span></span>
  </div>
</footer>
<script src="last-update.js" defer></script>
</body>
</html>
