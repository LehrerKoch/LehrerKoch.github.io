<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kongruenzsatz-Trainer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g0:#0d3a0d;--g1:#1c6e1c;--g2:#2ea02e;--g3:#d2ead2;--g4:#ecf7ec;
  --border:#b5d0b5;--bg:#f2f6f2;--card:#fff;
  --text:#1a1a1a;--muted:#666;--red:#bf3232;--orange:#c87820;
  --r:10px;--sh:0 1px 6px rgba(0,0,0,.09);
}
body{font-family:system-ui,'Segoe UI',sans-serif;font-size:14px;line-height:1.45;
  background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:7px 16px;background:var(--card);border-bottom:2px solid var(--g1);text-align:center;flex-shrink:0}
.hdr h1{font-size:1.1em;font-weight:700;color:var(--g0)}
.layout{flex:1;min-height:0;display:grid;grid-template-columns:360px 1fr;gap:10px;padding:10px;overflow:hidden}
.sidebar{display:flex;flex-direction:column;gap:7px;overflow-y:auto;min-height:0;padding-right:2px}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;box-shadow:var(--sh);flex-shrink:0}
.card-title{font-size:.73em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g1);margin-bottom:6px}
.chips{display:flex;flex-wrap:nowrap;gap:3px}
.chip{flex:1;min-width:0;text-align:center;padding:3px 1px;border:1.5px solid #ccc;border-radius:20px;
  font-size:.80em;font-weight:700;cursor:pointer;user-select:none;
  transition:background .12s,border-color .12s;color:#777;white-space:nowrap}
.chip.on{background:var(--g4);border-color:var(--g1);color:var(--g0)}
.chip.nonks{font-style:italic;border-style:dashed}
.chip.nonks.on{border-style:dashed}
.toggle-row{display:flex;align-items:flex-start;gap:6px;margin-top:5px;font-size:.80em;
  color:var(--muted);cursor:pointer;line-height:1.4}
.toggle-row input{margin-top:2px;cursor:pointer;flex-shrink:0;accent-color:var(--g1)}
.btn{width:100%;margin-top:6px;padding:5px 10px;border:2px solid var(--g1);border-radius:8px;
  background:var(--card);color:var(--g0);font-size:.86em;font-weight:700;cursor:pointer;transition:background .12s}
.btn:hover{background:var(--g4)}.btn:active{background:var(--g3)}
.sl-row{display:flex;align-items:center;gap:4px;margin:5px 0;font-size:.84em}
.sl-row label{width:17px;text-align:center;color:var(--muted);font-style:italic;font-size:1.1em;flex-shrink:0}
.sl-row input[type=range]{flex:1;min-width:0;height:5px;accent-color:var(--g1);cursor:pointer;
  -webkit-appearance:none;appearance:none;border-radius:3px;background:var(--border)}
.sl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
  border-radius:50%;background:var(--g1);cursor:pointer;border:2px solid white;
  box-shadow:0 1px 4px rgba(0,0,0,.25)}
.sl-row input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;
  background:var(--g1);cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.sl-row input[type=number]{width:52px;padding:2px 4px;border:1px solid var(--border);border-radius:5px;
  font-size:.83em;text-align:right;color:var(--text);background:var(--card);flex-shrink:0;
  -moz-appearance:textfield}
.sl-row input[type=number]::-webkit-inner-spin-button{opacity:.5}
.sl-row input[type=number]:focus{outline:2px solid var(--g1);border-color:var(--g1);outline-offset:0}
.sl-row .unit{width:17px;font-size:.77em;color:var(--muted);flex-shrink:0}
.quiz-given{background:var(--g4);border:1px solid var(--g3);border-radius:6px;
  padding:4px 8px;font-size:.83em;margin-bottom:6px;line-height:1.75}
.quiz-q{font-weight:700;font-size:.80em;color:var(--g0);margin-bottom:3px}
.quiz-btns{display:flex;flex-wrap:wrap;gap:3px}
.ans-btn{padding:3px 8px;border:1.5px solid #ccc;border-radius:18px;background:#f8f8f8;
  font-size:.78em;font-weight:700;cursor:pointer;transition:all .12s;touch-action:manipulation;white-space:nowrap}
.ans-btn:hover:not(:disabled){background:var(--g4);border-color:var(--g1)}
.ans-btn:disabled{cursor:not-allowed;opacity:.8}
.ans-btn.correct{background:#cef0ce!important;border-color:var(--g2)!important;color:var(--g0)!important}
.ans-btn.wrong{background:#fdd!important;border-color:var(--red)!important;color:var(--red)!important}
.ans-btn.reveal{background:#e8f7e8!important;border-color:var(--g1)!important;color:var(--g0)!important}
.ans-btn.nonks{font-style:italic;border-style:dashed;color:#555}
.quiz-fb{margin-top:3px;font-size:.77em;padding:3px 7px;border-radius:5px;line-height:1.4;display:none}
.quiz-fb.ok{background:#e4f5ea;border-left:3px solid var(--g1);color:var(--g0);display:block}
.quiz-fb.err{background:#fdecea;border-left:3px solid var(--red);color:var(--red);display:block}
.quiz-next{margin-top:6px;border-top:1px solid var(--border);padding-top:6px}
.quiz-done{margin-top:5px;font-size:.76em;color:var(--muted)}
.canvas-pane{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.svg-wrap{flex:1;min-height:0;overflow:hidden}
.svg-wrap svg{width:100%;height:100%;display:block}
.ctrl-bar{padding:5px 12px 6px;background:var(--g4);border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;font-size:.83em;flex-shrink:0}
.ctrl-desc{font-size:.82em;font-weight:600;color:var(--g0);min-height:18px;line-height:1.3}
.ctrl-row{display:flex;align-items:center;gap:8px}
.ctrl-row .step-grp{flex:1;display:flex;align-items:center;gap:6px}
.ctrl-row input[type=range]{flex:1;height:5px;accent-color:var(--g1);cursor:pointer;
  -webkit-appearance:none;appearance:none;border-radius:3px;background:var(--border)}
.ctrl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
  border-radius:50%;background:var(--g1);cursor:pointer;border:2px solid white;
  box-shadow:0 1px 4px rgba(0,0,0,.25)}
.ctrl-row input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;
  background:var(--g1);cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.ctrl-row .step-num{min-width:26px;font-weight:700;color:var(--g0);font-size:.86em}
.ctrl-row label{display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;font-size:.81em}
@media(max-width:700px){
  body{height:auto;overflow:auto}
  .layout{grid-template-columns:1fr;overflow:visible}
  .sidebar{overflow-y:visible}
  .canvas-pane{height:72vw;min-height:260px;max-height:440px;flex-shrink:0}
}
</style>
</head>
<body>
<header class="hdr"><h1>Kongruenzsatz-Trainer &amp; Konstruktion</h1></header>
<div class="layout">
<aside class="sidebar">
  <div class="card">
    <div class="card-title">Zufalls-Filter</div>
    <div class="chips" id="case-filter">
      <label class="chip on"><input type="checkbox" value="SSS" checked hidden onchange="flipChip(this)">SSS</label>
      <label class="chip on"><input type="checkbox" value="SWS" checked hidden onchange="flipChip(this)">SWS</label>
      <label class="chip on"><input type="checkbox" value="WSW" checked hidden onchange="flipChip(this)">WSW</label>
      <label class="chip on"><input type="checkbox" value="SWW" checked hidden onchange="flipChip(this)">SWW</label>
      <label class="chip on"><input type="checkbox" value="SsW" checked hidden onchange="flipChip(this)">SsW</label>
      <label class="chip nonks on"><input type="checkbox" value="sSw" checked hidden onchange="flipChip(this)">sSw</label>
    </div>
    <label class="toggle-row">
      <input type="checkbox" id="allow-impossible">
      <span>Unmögliche Fälle erlauben (Dreiecksungl., Winkelsumme, WWW)</span>
    </label>
    <button class="btn" onclick="generateRandomValues()">&#x1F3B2; Zufällige Werte</button>
  </div>
  <div class="card">
    <div class="card-title">Werte-Eingabe <span style="font-weight:400;color:var(--muted)">(genau 3)</span></div>
    <div class="chips" id="parts-selector" style="margin-bottom:9px">
      <label class="chip"><input type="checkbox" value="a"     hidden onchange="togglePart(this)">a</label>
      <label class="chip"><input type="checkbox" value="b"     hidden onchange="togglePart(this)">b</label>
      <label class="chip on"><input type="checkbox" value="c"  hidden onchange="togglePart(this)" checked>c</label>
      <label class="chip"><input type="checkbox" value="alpha" hidden onchange="togglePart(this)">&#945;</label>
      <label class="chip"><input type="checkbox" value="beta"  hidden onchange="togglePart(this)">&#946;</label>
      <label class="chip"><input type="checkbox" value="gamma" hidden onchange="togglePart(this)">&#947;</label>
    </div>
    <div id="input-container"></div>
  </div>
  <div class="card" id="quiz-card" style="display:none">
    <div class="card-title">Quiz</div>
    <div class="quiz-given" id="given-display"></div>
    <div id="quiz-step1">
      <div class="quiz-q">Welcher Kongruenzsatz / Fall liegt vor?</div>
      <div class="quiz-btns" id="q1-btns"></div>
      <div class="quiz-fb" id="q1-fb"></div>
    </div>
    <div id="quiz-step2" class="quiz-next" style="display:none">
      <div class="quiz-q" id="q2-text"></div>
      <div class="quiz-btns" id="q2-btns"></div>
      <div class="quiz-fb" id="q2-fb"></div>
    </div>
    <div id="quiz-done" class="quiz-done" style="display:none">Schritt-Regler rechts: Konstruktion anzeigen</div>
  </div>
</aside>
<main class="canvas-pane">
  <div class="svg-wrap" id="svg-wrap"></div>
  <div class="ctrl-bar">
    <div class="ctrl-desc" id="sketch-desc">W&auml;hle drei Werte aus.</div>
    <div class="ctrl-row">
      <div class="step-grp">
        <span>Schritt:</span>
        <input type="range" id="step-slider" min="0" max="4" value="4" oninput="drawSketch()">
        <span class="step-num" id="step-label">4/4</span>
      </div>
      <label><input type="checkbox" id="show-aux" checked onchange="drawSketch()"> Hilfslinien (vorige Schr.)</label>
    </div>
  </div>
</main>
</div>
<script>
// ── CONSTANTS ─────────────────────────────────────────
const RAD=Math.PI/180;
const rad=d=>d*RAD, deg=r=>r/RAD;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const isAng=p=>p==='alpha'||p==='beta'||p==='gamma';
const isSide=p=>p==='a'||p==='b'||p==='c';
const e1=n=>isFinite(n)?n.toFixed(1):'?';
const e0=n=>isFinite(n)?Math.round(n).toString():'?';
const rnd=(lo,hi)=>lo+Math.random()*(hi-lo);
const rndI=(lo,hi)=>lo+Math.floor(Math.random()*(hi-lo+1));
const rf=(v,d=1)=>parseFloat(v.toFixed(d));
const GN='#1a7a1a', BK='#222', MT='#778877', HC='#1b9a1b', HP='#adc4ad', RD='#bf3232', OG='#c87820';

// ── STATE ─────────────────────────────────────────────
let selectedParts=['c'];
let currentValues={a:5,b:6,c:7,alpha:53,beta:60,gamma:67};
let currentCase='';
let quizState={q1done:false,q2done:false};

// ── UI ────────────────────────────────────────────────
function flipChip(cb){cb.parentElement.classList.toggle('on',cb.checked);}

function togglePart(cb){
  if(cb.checked){if(selectedParts.length>=3){cb.checked=false;return;}selectedParts.push(cb.value);}
  else selectedParts=selectedParts.filter(p=>p!==cb.value);
  syncChipStyles();renderInputs();
}
function syncChipStyles(){
  document.querySelectorAll('#parts-selector .chip').forEach(l=>{
    const cb=l.querySelector('input');
    cb.checked=selectedParts.includes(cb.value);
    l.classList.toggle('on',cb.checked);
  });
}
function renderInputs(){
  const cont=document.getElementById('input-container');cont.innerHTML='';
  selectedParts.forEach(p=>{
    const ang=isAng(p),mn=ang?5:1,mx=ang?175:15,stp=ang?1:0.1;
    const sym={alpha:'\u03b1',beta:'\u03b2',gamma:'\u03b3'}[p]||p;
    const v=currentValues[p],unit=ang?'\u00b0':'cm';
    cont.innerHTML+=`<div class="sl-row"><label title="${p}">${sym}</label>`+
      `<input type="range" min="${mn}" max="${mx}" step="${stp}" value="${clamp(v,mn,mx)}" oninput="updVal('${p}',+this.value,'sl')">`+
      `<input type="number" id="num-${p}" step="${stp}" value="${ang?e0(v):e1(v)}" oninput="updVal('${p}',+this.value,'nm')">`+
      `<span class="unit">${unit}</span></div>`;
  });
  autoApply();
}
function updVal(p,v,src){
  if(!isFinite(v)||v<=0)return;
  const ang=isAng(p),mn=ang?1:0.01,mx=ang?179:999;
  v=clamp(v,mn,mx);currentValues[p]=v;
  const nm=document.getElementById('num-'+p);if(!nm)return;
  const row=nm.closest('.sl-row');if(!row)return;
  const sl=row.querySelector('input[type=range]');
  // slider stays at its boundary when value is outside its range — that's fine
  if(sl&&src!=='sl')sl.value=clamp(v,+sl.min,+sl.max);
  if(src!=='nm')nm.value=ang?e0(v):e1(v);
  autoApply();
}
function autoApply(){
  if(selectedParts.length!==3){
    document.getElementById('sketch-desc').textContent='W\u00e4hle drei Werte aus.';
    document.getElementById('svg-wrap').innerHTML='';
    document.getElementById('quiz-card').style.display='none';
    return;
  }
  determineCase();
  const syms={alpha:'\u03b1',beta:'\u03b2',gamma:'\u03b3'};
  document.getElementById('given-display').innerHTML=selectedParts.map(p=>{
    const s=syms[p]||p,u=isAng(p)?'\u00b0':' cm';
    return `<em style="color:${GN};font-weight:700">${s}</em>\u200a=\u200a${currentValues[p]}${u}`;
  }).join('&ensp;');
  quizState={q1done:false,q2done:false};
  buildQuiz();
  document.getElementById('quiz-card').style.display='';
  const ms=maxSteps(),sl=document.getElementById('step-slider');
  sl.max=ms;if(+sl.value>ms)sl.value=ms;
  drawSketch();
}

// ── CASE DETECTION ────────────────────────────────────
function determineCase(){
  const sides=selectedParts.filter(isSide),angles=selectedParts.filter(isAng);
  const ns=sides.length,na=angles.length;
  if(ns===0&&na===3){currentCase='WWW';return;}
  if(ns===3&&na===0){currentCase='SSS';return;}
  if(ns===2&&na===1){
    const ang=angles[0],opp={alpha:'a',beta:'b',gamma:'c'}[ang];
    if(!sides.includes(opp)){currentCase='SWS';return;}
    const other=sides.find(s=>s!==opp);
    currentCase=currentValues[opp]>=currentValues[other]?'SsW':'sSw';return;
  }
  if(ns===1&&na===2){
    const side=sides[0];
    const adj={a:['beta','gamma'],b:['alpha','gamma'],c:['alpha','beta']}[side];
    currentCase=angles.every(a=>adj.includes(a))?'WSW':'SWW';return;
  }
  currentCase='Keiner';
}

// ── GEOMETRY ─────────────────────────────────────────
// Coord system: A=(0,0), B=(c,0), C=(b*cos(alpha), b*sin(alpha))
// alpha at A (between AB and AC), beta at B (between BA and BC), gamma at C
// a=BC (opp A), b=AC (opp B), c=AB (opp C)
function computeGeometry(){
  let a=currentValues.a,b=currentValues.b,c=currentValues.c;
  let alpha=currentValues.alpha,beta=currentValues.beta,gamma=currentValues.gamma;
  const givenS=selectedParts.filter(isSide),givenA=selectedParts.filter(isAng);
  let valid=true,reason='',C2=null;
  if(givenA.length===2){
    if(!givenA.includes('alpha'))     alpha=180-beta-gamma;
    else if(!givenA.includes('beta')) beta=180-alpha-gamma;
    else                              gamma=180-alpha-beta;
  }
  if(givenA.length>=2&&Math.min(alpha,beta,gamma)<0.5){
    valid=false;reason='Winkelsumme \u2265 180\u00b0!';}
  if(valid)switch(currentCase){
    case 'SSS':{
      const s=[a,b,c].slice().sort((x,y)=>x-y);
      if(s[0]+s[1]<=s[2]+1e-9){valid=false;reason=e1(s[0])+'+'+e1(s[1])+' \u2264 '+e1(s[2])+' cm';}
      else{alpha=deg(Math.acos(clamp((b*b+c*c-a*a)/(2*b*c),-1,1)));
           beta=deg(Math.acos(clamp((a*a+c*c-b*b)/(2*a*c),-1,1)));gamma=180-alpha-beta;}
      break;}
    case 'SWS':{
      const ang=givenA[0],av={alpha,beta,gamma}[ang];
      const sv1=currentValues[givenS[0]],sv2=currentValues[givenS[1]];
      const op=Math.sqrt(Math.max(0,sv1*sv1+sv2*sv2-2*sv1*sv2*Math.cos(rad(av))));
      if(ang==='alpha')a=op; else if(ang==='beta')b=op; else c=op;
      alpha=deg(Math.acos(clamp((b*b+c*c-a*a)/(2*b*c),-1,1)));
      beta=deg(Math.acos(clamp((a*a+c*c-b*b)/(2*a*c),-1,1)));gamma=180-alpha-beta;
      break;}
    case 'WSW':case 'SWW':{
      const sn=givenS[0],sv=currentValues[sn];
      const oppA={a:'alpha',b:'beta',c:'gamma'}[sn];
      const ov={alpha,beta,gamma}[oppA];
      if(Math.sin(rad(ov))<1e-9){valid=false;reason='Winkelkombination ung\u00fcltig.';break;}
      const k=sv/Math.sin(rad(ov));
      a=k*Math.sin(rad(alpha));b=k*Math.sin(rad(beta));c=k*Math.sin(rad(gamma));
      break;}
    case 'SsW':case 'sSw':{
      // adjK = given side adjacent to angle vertex; oppK = given side opposite angle vertex
      // thirdK = missing side (to be computed via foot/h/off)
      const angK=givenA[0];
      const oppK={alpha:'a',beta:'b',gamma:'c'}[angK];
      const adjK=givenS.find(s=>s!==oppK);
      const thirdK=['a','b','c'].find(s=>s!==oppK&&s!==adjK);
      const oppV=currentValues[oppK], adjV_=currentValues[adjK];
      const angVal={alpha,beta,gamma}[angK];
      // Perpendicular distance from P_other (far end of adj side) to the ray from P_ang
      const h_=adjV_*Math.sin(rad(angVal));
      const foot_=adjV_*Math.cos(rad(angVal));
      if(oppV+1e-6<h_){valid=false;reason=oppK+'='+e1(oppV)+' < h='+e1(h_)+' cm';break;}
      const off_=Math.sqrt(Math.max(0,oppV*oppV-h_*h_));
      const thirdV1=foot_+off_;
      // Assign the computed third side, then derive all angles via cosine rule
      if(thirdK==='a')a=thirdV1; else if(thirdK==='b')b=thirdV1; else c=thirdV1;
      if(a<1e-9||b<1e-9||c<1e-9){valid=false;reason='Ungültige Seite';break;}
      alpha=deg(Math.acos(clamp((b*b+c*c-a*a)/(2*b*c),-1,1)));
      beta =deg(Math.acos(clamp((a*a+c*c-b*b)/(2*a*c),-1,1)));
      gamma=180-alpha-beta;
      if(currentCase==='sSw'&&off_>1e-6){const tv2=foot_-off_;if(tv2>1e-6)C2={pending:true};}
      break;}
    case 'WWW':
      {const sumA=alpha+beta+gamma;
      if(Math.abs(sumA-180)>0.5){valid=false;reason='Winkelsumme='+Math.round(sumA)+'\u00b0 \u2260 180\u00b0';break;}
      valid=false;reason='Nur Winkel \u2192 \u221e viele \u00e4hnliche Dreiecke';}
      c=7;{const k=c/Math.sin(rad(gamma));a=k*Math.sin(rad(alpha));b=k*Math.sin(rad(beta));}
      break;
  }
  const A={x:0,y:0},B={x:c,y:0};let C=null;
  if(currentCase==='SsW'||currentCase==='sSw'){
    if(valid){
      C={x:b*Math.cos(rad(alpha)),y:b*Math.sin(rad(alpha))};
      // Check ambiguity via the construction (independent of standard coords)
      const angK=givenA[0];
      const oppK={alpha:'a',beta:'b',gamma:'c'}[angK];
      const adjK=givenS.find(s=>s!==oppK);
      const adjV_=currentValues[adjK],oppV_=currentValues[oppK],angV_=currentValues[angK];
      const sinA_=Math.sin(rad(angV_));
      const disc_=oppV_*oppV_-adjV_*adjV_*sinA_*sinA_;
      if(currentCase==='sSw'&&disc_>=0){
        const t2_=adjV_*Math.cos(rad(angV_))-Math.sqrt(disc_);
        if(t2_>1e-4)C2={pending:true};
      }
    }
  } else if(valid||currentCase==='WWW'){
    C={x:b*Math.cos(rad(alpha)),y:b*Math.sin(rad(alpha))};
  } else if(!valid&&currentCase==='SSS'){
    const cosA=clamp((b*b+c*c-a*a)/(2*b*c),-1,1);
    const aD=deg(Math.acos(cosA));
    C={x:b*Math.cos(rad(aD)),y:Math.max(b*Math.sin(rad(aD)),0.05)};
  }
  return{A,B,C,C2,a,b,c,alpha,beta,gamma,givenS,givenA,valid,reason};
}

// ── STABLE VIEWPORT TRANSFORM ────────────────────────
let _t,_W,_H;
function computeTransform(geo,W,H){
  const{A,B,C,C2,givenS,givenA,valid}=geo;
  const mg=68;let pts;
  if((currentCase==='SsW'||currentCase==='sSw')&&!valid){
    // Invalid: use local construction coords
    const angK=givenA[0],oppK={alpha:'a',beta:'b',gamma:'c'}[angK];
    const adjK=givenS.find(s=>s!==oppK);
    const adjVal=currentValues[adjK],angVal=currentValues[angK];

    else{pA2={x:0,y:0};pB2={x:rv2,y:0};pC2={x:rv2*0.5,y:rv2*sinG2};}
    pts=[pA2,pB2,pC2];
  } else {
    pts=[{x:A.x,y:A.y},{x:B.x,y:B.y}];
    if(C&&isFinite(C.x)&&isFinite(C.y))pts.push(C);
    // For valid sSw, also include C2 position
    if((currentCase==='SsW'||currentCase==='sSw')&&valid&&C&&C2&&C2.pending){
      const angK=givenA[0],oppK={alpha:'a',beta:'b',gamma:'c'}[angK];
      const adjK=givenS.find(s=>s!==oppK),oppVal=currentValues[oppK];
      const gv={A,B,C};
      const angVN={alpha:'A',beta:'B',gamma:'C'}[angK];
      const adjVNs={c:['A','B'],b:['A','C'],a:['B','C']}[adjK];
      const circVN=adjVNs.find(v=>v!==angVN);
      const thirdVN=['A','B','C'].find(v=>v!==angVN&&v!==circVN);
      const angPt=gv[angVN],circPt=gv[circVN],thirdPt=gv[thirdVN];
      const rayDir=Math.atan2(thirdPt.y-angPt.y,thirdPt.x-angPt.x);
      const cosR=Math.cos(rayDir),sinR=Math.sin(rayDir);
      const dx=angPt.x-circPt.x,dy=angPt.y-circPt.y;

  let y0=Math.min(...pts.map(p=>p.y))-0.15,y1=Math.max(...pts.map(p=>p.y));
  const w=Math.max(x1-x0,0.1),h=Math.max(y1-y0,0.1);

}
function setTfm(t,W,H){_t=t;_W=W;_H=H;}
const sx=x=>x*_t.s+_t.ox;
const sy=y=>_t.oy-y*_t.s;
const sp=p=>`${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`;
const dd=p=>p&&isFinite(p.x)&&isFinite(p.y);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── SVG BUILDERS ─────────────────────────────────────
function sLine(p1,p2,col,sw,dash=''){
  if(!dd(p1)||!dd(p2))return'';
  return`<line x1="${sx(p1.x).toFixed(1)}" y1="${sy(p1.y).toFixed(1)}" x2="${sx(p2.x).toFixed(1)}" y2="${sy(p2.y).toFixed(1)}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"${dash?' stroke-dasharray="'+dash+'"':''} fill="none"/>`;
}
function sCirc(cx,cy,r,col,sw,dash=''){
  return`<circle cx="${sx(cx).toFixed(1)}" cy="${sy(cy).toFixed(1)}" r="${(r*_t.s).toFixed(1)}" fill="none" stroke="${col}" stroke-width="${sw}"${dash?' stroke-dasharray="'+dash+'"':''}/>`
}
function sDot(p,r,fill,sc,ssw){
  if(!dd(p))return'';
  sc=sc||'none';ssw=ssw||0;
  return`<circle cx="${sx(p.x).toFixed(1)}" cy="${sy(p.y).toFixed(1)}" r="${r}" fill="${fill}"${sc!=='none'?' stroke="'+sc+'" stroke-width="'+ssw+'"':''}/>`
}
function sRay(p,ang_d,col,sw){
  if(!dd(p))return'';
  const L=9999;
  return`<line x1="${sx(p.x).toFixed(1)}" y1="${sy(p.y).toFixed(1)}" x2="${sx(p.x+L*Math.cos(rad(ang_d))).toFixed(1)}" y2="${sy(p.y+L*Math.sin(rad(ang_d))).toFixed(1)}" stroke="${col}" stroke-width="${sw}" stroke-dasharray="8,5" stroke-linecap="round"/>`;
}
function sVtx(p,nm,ctr){
  if(!dd(p)||!dd(ctr))return'';
  const dx=p.x-ctr.x,dy=p.y-ctr.y,L=Math.sqrt(dx*dx+dy*dy)||1,push=17/_t.s;
  const lx=p.x+(dx/L)*push,ly=p.y+(dy/L)*push;
  const col=nm.indexOf('\u2082')>=0?OG:'#162a16';
  return`<text x="${sx(lx).toFixed(1)}" y="${sy(ly).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="700" font-family="serif" fill="${col}">${esc(nm)}</text>`;
}
function sSideLbl(p1,p2,opp,nm,val,isG){
  if(!dd(p1)||!dd(p2)||!dd(opp))return'';
  const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
  const ex=p2.x-p1.x,ey=p2.y-p1.y,L=Math.sqrt(ex*ex+ey*ey)||1;
  let nx=-ey/L,ny=ex/L;
  if((opp.x-mx)*nx+(opp.y-my)*ny>0){nx=-nx;ny=-ny;}
  const OFF=clamp(L*0.1,0.1,0.4),lx=mx+nx*OFF,ly=my+ny*OFF;
  return`<text x="${sx(lx).toFixed(1)}" y="${sy(ly).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-style="italic" font-weight="${isG?700:500}" fill="${isG?GN:MT}">${esc(nm+'='+val)}</text>`;
}
function sAngArc(vtx,p1,p2,r,lbl,isG){
  if(!dd(vtx)||!dd(p1)||!dd(p2))return'';
  const a1=Math.atan2(p1.y-vtx.y,p1.x-vtx.x)/RAD;
  const a2=Math.atan2(p2.y-vtx.y,p2.x-vtx.x)/RAD;
  let sa=a1,ea=a2,span=((ea-sa)%360+360)%360;
  if(span>180){let t=sa;sa=ea;ea=t;span=360-span;}
  if(span<0.5)return'';
  const steps=Math.max(10,Math.round(span/3)),pl=[];
  for(let i=0;i<=steps;i++){const ag=sa+span*i/steps;pl.push(sx(vtx.x+r*Math.cos(rad(ag))).toFixed(1)+','+sy(vtx.y+r*Math.sin(rad(ag))).toFixed(1));}
  const ma=sa+span/2,lr=r*1.5;
  const lx=vtx.x+lr*Math.cos(rad(ma)),ly=vtx.y+lr*Math.sin(rad(ma));
  const col=isG?GN:MT,sw=isG?2.5:1.5;
  return`<polyline points="${pl.join(' ')}" fill="none" stroke="${col}" stroke-width="${sw}"/>`+
         `<text x="${sx(lx).toFixed(1)}" y="${sy(ly).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-style="italic" font-weight="${isG?700:500}" fill="${col}">${esc(lbl)}</text>`;
}
function sErrBanner(msg){
  const cy=_H*0.42,cx=_W/2,tw=Math.max(msg.length*6.8,50),p=10,ph=28;
  return`<rect x="${(cx-tw/2-p).toFixed(0)}" y="${(cy-ph/2).toFixed(0)}" width="${(tw+2*p).toFixed(0)}" height="${ph}" rx="5" fill="rgba(191,50,50,.92)"/>`+
         `<text x="${cx.toFixed(0)}" y="${cy.toFixed(0)}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="white">${esc(msg)}</text>`;
}
const ctr3=(A,B,C)=>({x:(A.x+B.x+C.x)/3,y:(A.y+B.y+C.y)/3});
const arcR=(vtx,p1,p2)=>{const d1=Math.sqrt((vtx.x-p1.x)**2+(vtx.y-p1.y)**2),d2=Math.sqrt((vtx.x-p2.x)**2+(vtx.y-p2.y)**2);return clamp(Math.min(d1,d2)*0.22,0.18,0.65);};

// Draw the complete final triangle (step 4): black sides + green highlights + all arcs + labels.
// No duplicate arcs - all three drawn exactly once.
function addFinalTriangle(parts,A,B,C,geo,ctr){
  const{a,b,c,alpha,beta,gamma,givenS,givenA}=geo;
  parts.unshift(`<polygon points="${sp(A)} ${sp(B)} ${sp(C)}" fill="rgba(25,110,25,.07)" stroke="none"/>`);
  // sides: black first, then green overlay for given
  parts.push(sLine(A,B,BK,2));parts.push(sLine(B,C,BK,2));parts.push(sLine(A,C,BK,2));
  if(givenS.includes('c'))parts.push(sLine(A,B,GN,3));
  if(givenS.includes('a'))parts.push(sLine(B,C,GN,3));
  if(givenS.includes('b'))parts.push(sLine(A,C,GN,3));
  parts.push(sSideLbl(A,B,C,'c',e1(c)+' cm',givenS.includes('c')));
  parts.push(sSideLbl(B,C,A,'a',e1(a)+' cm',givenS.includes('a')));
  parts.push(sSideLbl(A,C,B,'b',e1(b)+' cm',givenS.includes('b')));
  // Angles: all three, no duplicates
  parts.push(sAngArc(A,B,C,arcR(A,B,C),'\u03b1='+e0(alpha)+'\u00b0',givenA.includes('alpha')));
  parts.push(sAngArc(B,A,C,arcR(B,A,C),'\u03b2='+e0(beta)+'\u00b0',givenA.includes('beta')));
  parts.push(sAngArc(C,A,B,arcR(C,A,B),'\u03b3='+e0(gamma)+'\u00b0',givenA.includes('gamma')));
  parts.push(sDot(A,4,'white',BK,1.5));parts.push(sDot(B,4,'white',BK,1.5));
  parts.push(sDot(C,5,GN,'white',1.5));
  parts.push(sVtx(A,'A',ctr));parts.push(sVtx(B,'B',ctr));parts.push(sVtx(C,'C',ctr));
}

// ── SSS ──────────────────────────────────────────────
// Given a,b,c. Base=AB=c. Circle(A,b) ∩ Circle(B,a) = C.
function drawSSS(parts,geo,step,sp2){
  if(step===0)return;
  const{A,B,C,a,b,c,givenS,givenA,valid,reason}=geo;
  const ctr=C?ctr3(A,B,C):{x:B.x/2,y:Math.max(b,1)};
  // Step 1: base AB=c (all sides given in SSS → green)
  parts.push(sLine(A,B,GN,3));

    parts.push(sDot(A,4,'white',BK,1.5));parts.push(sDot(B,4,'white',BK,1.5));
    parts.push(sVtx(A,'A',{x:B.x/2,y:-0.4}));parts.push(sVtx(B,'B',{x:B.x/2,y:-0.4}));
    parts.push(sSideLbl(A,B,C||{x:B.x/2,y:b},'c',e1(c)+' cm',true));

  if(step>=2){const cur=step===2;if(cur||sp2)parts.push(sCirc(A.x,A.y,b,cur?HC:HP,cur?2:1.5,cur?'':'8,5'));}
  // Step 3: circle(B,a) — mark intersection C
  if(step>=3){
    const cur=step===3;if(cur||sp2)parts.push(sCirc(B.x,B.y,a,cur?HC:HP,cur?2:1.5,cur?'':'8,5'));
    if(valid&&C&&step<4){parts.push(sDot(C,5.5,RD,'white',1.5));parts.push(sVtx(C,'C',ctr));}

  if(step>=4){if(valid&&C)addFinalTriangle(parts,A,B,C,geo,ctr);else parts.push(sErrBanner('Dreiecksungl.: '+reason));}

// ── SWS ──────────────────────────────────────────────

    parts.push(sAngArc(C,A,B,arcR(C,A,B),'\u03b3='+e0(gamma)+'\u00b0',givenA.includes('gamma')));
    if(valid&&step<4){parts.push(sDot(B,5.5,RD,'white',1.5));parts.push(sVtx(B,'B',ctr));}
    else if(!valid)parts.push(sErrBanner(reason));
  }
  if(step>=4){if(valid)addFinalTriangle(parts,A,B,C,geo,ctr);else parts.push(sErrBanner(reason));}
}
// base=a: ray from B at 180 deg (leftward toward A), ray from C toward A
function drawWSW_a(parts,geo,step,sp2){
  if(step===0)return;
  const{A,B,C,a,b,c,alpha,beta,gamma,givenS,givenA,valid,reason}=geo;
  if(!C)return;
  const ctr=ctr3(A,B,C);
  const dirCA=Math.atan2(A.y-C.y,A.x-C.x)/RAD;
  parts.push(sLine(B,C,givenS.includes('a')?GN:BK,givenS.includes('a')?3:2));
  if(step<4){
    parts.push(sDot(B,4,'white',BK,1.5));parts.push(sDot(C,4,'white',BK,1.5));
    const refC={x:(B.x+C.x)/2,y:Math.min(B.y,C.y)-0.4};
    parts.push(sVtx(B,'B',refC));parts.push(sVtx(C,'C',refC));
    parts.push(sSideLbl(B,C,A,'a',e1(a)+' cm',givenS.includes('a')));
  }
  if(step>=2){
    const cur=step===2;if(cur||sp2)parts.push(sRay(B,180,cur?HC:HP,cur?2:1.5));
    parts.push(sAngArc(B,A,C,arcR(B,A,C),'\u03b2='+e0(beta)+'\u00b0',givenA.includes('beta')));
  }
  if(step>=3){
    const cur=step===3;if(cur||sp2)parts.push(sRay(C,dirCA,cur?HC:HP,cur?2:1.5));
    parts.push(sAngArc(C,B,A,arcR(C,B,A),'\u03b3='+e0(gamma)+'\u00b0',givenA.includes('gamma')));
    if(valid&&step<4){parts.push(sDot(A,5.5,RD,'white',1.5));parts.push(sVtx(A,'A',ctr));}
    else if(!valid)parts.push(sErrBanner(reason));
  }
  if(step>=4){if(valid)addFinalTriangle(parts,A,B,C,geo,ctr);else parts.push(sErrBanner(reason));}
}

// ── SsW / sSw ────────────────────────────────────────
function drawSSA(parts,geo,step,sp2){
  if(step===0)return;
  const{A,B,C,C2,a,b,c,alpha,beta,gamma,givenS,givenA,valid,reason}=geo;

  // Role determination
  const angK=givenA[0];
  const oppK={alpha:'a',beta:'b',gamma:'c'}[angK];
  const adjK=givenS.find(s=>s!==oppK);
  const angVN={alpha:'A',beta:'B',gamma:'C'}[angK];
  const adjVNs={c:['A','B'],b:['A','C'],a:['B','C']}[adjK];
  const circVN=adjVNs.find(v=>v!==angVN);
  const thirdVN=['A','B','C'].find(v=>v!==angVN&&v!==circVN);
  const angSym={alpha:'\u03b1',beta:'\u03b2',gamma:'\u03b3'};
  const vAng={A:'alpha',B:'beta',C:'gamma'};
  const adjVal=currentValues[adjK],oppVal=currentValues[oppK],angValG=currentValues[angK];

  // ── Positions ──
  // Valid: use standard geo coords (A/B/C correct orientation)
  // Invalid: build local coords so something sensible is drawn
  let gPts; // {A,B,C} in drawing space
  if(valid&&C){
    gPts={A,B,C};
  } else {
    // Local coords: match standard-case layout (A={0,0}, B on x-axis, C above)
    // so the scene doesn't jump when transitioning valid↔invalid.
    const rv=adjVal;
    const cosG=Math.cos(rad(angValG)),sinG=Math.sin(rad(angValG));
    let locA,locB,locC;
    if(angVN==='A'){
      locA={x:0,y:0}; locB={x:rv,y:0}; locC={x:rv*cosG,y:rv*sinG};
    } else if(angVN==='B'){
      // Angle at B between BA(180°) and BC = angValG → BC dir = 180°-angValG
      locA={x:0,y:0}; locB={x:rv,y:0};
      locC={x:rv-rv*cosG,y:rv*sinG};
    } else { // angVN==='C', place C above midpoint
      locA={x:0,y:0}; locB={x:rv,y:0};
      locC={x:rv*0.5,y:rv*sinG};
    }
    gPts={A:locA,B:locB,C:locC};
  }
  const angPt=gPts[angVN],circPt=gPts[circVN],thirdPt=gPts[thirdVN];

  // C2 position: ray-circle intersection in standard coords (valid only)
  let C2pt=null;
  if(valid&&C&&C2&&C2.pending){
    const rayDir=Math.atan2(thirdPt.y-angPt.y,thirdPt.x-angPt.x);
    const cosR=Math.cos(rayDir),sinR=Math.sin(rayDir);
    const dx=angPt.x-circPt.x,dy=angPt.y-circPt.y;
    const footP=dx*cosR+dy*sinR;
    const disc2=oppVal*oppVal-(dx*dx+dy*dy-footP*footP);
    if(disc2>=0){const sqD=Math.sqrt(disc2);const t2=-footP-sqD;if(t2>1e-4)C2pt={x:angPt.x+t2*cosR,y:angPt.y+t2*sinR};}
  }

  const ctr1=valid&&C?ctr3(gPts.A,gPts.B,gPts.C):{x:(angPt.x+circPt.x)/2+0.5,y:oppVal*0.4};
  const fs=4;

  // Helpers
  const angLbl=(vn,sub,useGeo)=>{
    const k=vAng[vn];
    const dg=useGeo&&valid?Math.round({alpha,beta,gamma}[k]):Math.round(angValG);
    return angSym[k]+(sub||'')+'='+(k===angK||useGeo?dg:'?')+'\u00b0';
  };

  // ── Step 1: draw base (adjK) ──
  const adjP1=gPts[adjVNs[0]],adjP2=gPts[adjVNs[1]];
  parts.push(sLine(adjP1,adjP2,GN,3));
  // Vertex dots for base – drawn in all steps so they stay visible even in step 4 invalid
  parts.push(sDot(adjP1,4,'white',BK,1.5));
  parts.push(sDot(adjP2,4,'white',BK,1.5));
  if(step<fs||(step>=fs&&!valid)){
    // Labels for base vertices shown when no final triangle drawn
    parts.push(sVtx(adjP1,adjVNs[0],{x:(adjP1.x+adjP2.x)/2,y:Math.min(adjP1.y,adjP2.y)-0.5}));
    parts.push(sVtx(adjP2,adjVNs[1],{x:(adjP1.x+adjP2.x)/2,y:Math.min(adjP1.y,adjP2.y)-0.5}));
    parts.push(sSideLbl(adjP1,adjP2,thirdPt,adjK,e1(adjVal)+' cm',true));
  }

  // ── Step 2: ray + angle arc ──
  if(step>=2){
    const cur=step===2;
    if(cur||sp2)parts.push(sRay(angPt,Math.atan2(thirdPt.y-angPt.y,thirdPt.x-angPt.x)/RAD,cur?HC:HP,cur?2:1.5));
    parts.push(sAngArc(angPt,circPt,thirdPt,arcR(angPt,circPt,thirdPt),angSym[angK]+'='+Math.round(angValG)+'\u00b0',true));
  }

  // ── Step 3: circle + intersections ──
  if(step>=3){
    const cur=step===3;
    if(cur||sp2)parts.push(sCirc(circPt.x,circPt.y,oppVal,cur?HC:HP,cur?2:1.5,cur?'':'8,5'));
    if(!valid){
      parts.push(sErrBanner(reason));
    } else if(step<fs){
      parts.push(sDot(thirdPt,5.5,RD,'white',1.5));
      parts.push(sVtx(thirdPt,thirdVN,ctr1));
      if(C2pt){
        const ctr2=ctr3(adjP1,adjP2,C2pt);
        parts.push(sDot(C2pt,5.5,OG,'white',1.5));
        parts.push(sVtx(C2pt,thirdVN+'\u2082',ctr2));
      }
    }
  }

  // ── Step 4: final triangle(s) ──
  if(step>=fs){
    if(!valid){
      parts.push(sErrBanner('Kein Dreieck: '+reason));
      return;
    }
    const LA=gPts.A,LB=gPts.B,LC=gPts.C;
    // Fill
    parts.unshift(`<polygon points="${sp(LA)} ${sp(LB)} ${sp(LC)}" fill="rgba(25,110,25,.07)" stroke="none"/>`);
    // Sides
    [[LA,LB,'c'],[LB,LC,'a'],[LA,LC,'b']].forEach(([p1,p2,s])=>{
      parts.push(sLine(p1,p2,BK,2));
      if(givenS.includes(s))parts.push(sLine(p1,p2,GN,3));
    });
    parts.push(sSideLbl(LA,LB,LC,'c',e1(c)+' cm',givenS.includes('c')));
    parts.push(sSideLbl(LB,LC,LA,'a',e1(a)+' cm',givenS.includes('a')));
    parts.push(sSideLbl(LA,LC,LB,'b',e1(b)+' cm',givenS.includes('b')));

    if(!C2pt){
      // Unambiguous: draw all 3 angles once each
      parts.push(sAngArc(LA,LB,LC,arcR(LA,LB,LC),angSym.alpha+'='+Math.round(alpha)+'\u00b0',givenA.includes('alpha')));
      parts.push(sAngArc(LB,LA,LC,arcR(LB,LA,LC),angSym.beta+'='+Math.round(beta)+'\u00b0',givenA.includes('beta')));
      parts.push(sAngArc(LC,LA,LB,arcR(LC,LA,LB),angSym.gamma+'='+Math.round(gamma)+'\u00b0',givenA.includes('gamma')));
      parts.push(sDot(gPts[adjVNs[0]],4,'white',BK,1.5));parts.push(sDot(gPts[adjVNs[1]],4,'white',BK,1.5));parts.push(sDot(gPts[thirdVN],5,GN,'white',1.5));
      parts.push(sVtx(LA,'A',ctr1));parts.push(sVtx(LB,'B',ctr1));parts.push(sVtx(LC,'C',ctr1));
    } else {
      // Ambiguous: angVN angle = single arc (same for both solutions since it's given)
      const ctr2=ctr3(adjP1,adjP2,C2pt);
      const ang_vals={alpha,beta,gamma};

      // angVN: no subscript (identical in both solutions since it's given)
      parts.push(sAngArc(gPts[angVN],gPts[circVN],gPts[thirdVN],arcR(gPts[angVN],gPts[circVN],gPts[thirdVN]),
        angSym[angK]+'='+Math.round(angValG)+'\u00b0',true));
      // circVN: subscript ₁
      const circA1=angSym[vAng[circVN]]+'\u2081='+Math.round(ang_vals[vAng[circVN]])+'\u00b0';
      parts.push(sAngArc(gPts[circVN],gPts[angVN],gPts[thirdVN],arcR(gPts[circVN],gPts[angVN],gPts[thirdVN]),circA1,false));
      // thirdVN (C₁): subscript ₁
      const thirdA1=angSym[vAng[thirdVN]]+'\u2081='+Math.round(ang_vals[vAng[thirdVN]])+'\u00b0';
      parts.push(sAngArc(gPts[thirdVN],gPts[angVN],gPts[circVN],arcR(gPts[thirdVN],gPts[angVN],gPts[circVN]),thirdA1,false));

      // Primary triangle vertices
      parts.push(sDot(gPts[adjVNs[0]],4,'white',BK,1.5));parts.push(sDot(gPts[adjVNs[1]],4,'white',BK,1.5));parts.push(sDot(gPts[thirdVN],5,GN,'white',1.5));
      parts.push(sVtx(LA,'A',ctr1));parts.push(sVtx(LB,'B',ctr1));parts.push(sVtx(LC,'C',ctr1));

      // Second triangle
      const L2={...gPts,[thirdVN]:C2pt};
      const LA2=L2.A,LB2=L2.B,LC2=L2.C;
      const a2=Math.sqrt((LB2.x-LC2.x)**2+(LB2.y-LC2.y)**2);
      const b2=Math.sqrt((LA2.x-LC2.x)**2+(LA2.y-LC2.y)**2);
      const c2=Math.sqrt((LA2.x-LB2.x)**2+(LA2.y-LB2.y)**2);
      const alpha2=deg(Math.acos(clamp((b2*b2+c2*c2-a2*a2)/(2*b2*c2),-1,1)));
      const beta2 =deg(Math.acos(clamp((a2*a2+c2*c2-b2*b2)/(2*a2*c2),-1,1)));
      const gamma2=180-alpha2-beta2;
      const ang2={alpha:alpha2,beta:beta2,gamma:gamma2};

      parts.push(`<polygon points="${sp(LA2)} ${sp(LB2)} ${sp(LC2)}" fill="rgba(200,120,0,.07)" stroke="none"/>`);
      parts.push(sLine(gPts[angVN],C2pt,OG,2,'5,3'));
      parts.push(sLine(gPts[circVN],C2pt,OG,2,'5,3'));
      // Reuse adj side (already drawn green above) — just draw the two new sides orange
      parts.push(sDot(C2pt,5,OG,'white',1.5));
      parts.push(sVtx(C2pt,thirdVN+'\u2082',ctr2));
      // circVN: subscript ₂  (offset arc radius slightly to avoid overlap)
      const circA2=angSym[vAng[circVN]]+'\u2082='+Math.round(ang2[vAng[circVN]])+'\u00b0';
      parts.push(sAngArc(gPts[circVN],gPts[angVN],C2pt,arcR(gPts[circVN],gPts[angVN],C2pt)*1.35,circA2,false));
      // thirdVN (C₂): subscript ₂
      const thirdA2=angSym[vAng[thirdVN]]+'\u2082='+Math.round(ang2[vAng[thirdVN]])+'\u00b0';
      parts.push(sAngArc(C2pt,gPts[angVN],gPts[circVN],arcR(C2pt,gPts[angVN],gPts[circVN]),thirdA2,false));

      const ey2=Math.min(sy(gPts[thirdVN].y),sy(C2pt.y))-14;
    }
  }
}

// ── WWW ──────────────────────────────────────────────
function drawWWW(parts,geo,step){
  if(step===0)return;
  const{A,B,C,a,b,c,alpha,beta,gamma,givenA}=geo;
  // Only draw if angles actually sum to 180 (within tolerance)
  if(Math.abs(alpha+beta+gamma-180)>0.5){
    const cx=_W/2,ew=Math.min(_W-20,340);
    parts.push(`<rect x="${(cx-ew/2).toFixed(0)}" y="${(_H/2-16).toFixed(0)}" width="${ew}" height="32" rx="5" fill="rgba(191,50,50,.9)"/>`);
    parts.push(`<text x="${cx.toFixed(0)}" y="${(_H/2).toFixed(0)}" text-anchor="middle" dominant-baseline="middle" font-size="11.5" font-weight="700" fill="white">Winkelsumme = ${Math.round(alpha+beta+gamma)}\u00b0 \u2260 180\u00b0 \u2013 kein Dreieck!</text>`);
    return;
  }
  const ctr=ctr3(A,B,C);
  parts.push(`<polygon points="${sp(A)} ${sp(B)} ${sp(C)}" fill="rgba(80,100,80,.07)" stroke="none"/>`);
  parts.push(sLine(A,B,'#8a9a8a',1.5));parts.push(sLine(B,C,'#8a9a8a',1.5));parts.push(sLine(A,C,'#8a9a8a',1.5));
  parts.push(sAngArc(A,B,C,arcR(A,B,C),'\u03b1='+e0(alpha)+'\u00b0',givenA.includes('alpha')));
  parts.push(sAngArc(B,A,C,arcR(B,A,C),'\u03b2='+e0(beta)+'\u00b0',givenA.includes('beta')));
  parts.push(sAngArc(C,A,B,arcR(C,A,B),'\u03b3='+e0(gamma)+'\u00b0',givenA.includes('gamma')));
  parts.push(sDot(A,4,'#8a9a8a'));parts.push(sDot(B,4,'#8a9a8a'));parts.push(sDot(C,4,'#8a9a8a'));
  parts.push(sVtx(A,'A',ctr));parts.push(sVtx(B,'B',ctr));parts.push(sVtx(C,'C',ctr));
  if(step>=2){
    const sc=1.44,B2={x:B.x*sc,y:0},C2w={x:C.x*sc,y:C.y*sc};
    parts.push(sLine(A,B2,'#3a8070',1.5,'5,4'));parts.push(sLine(B2,C2w,'#3a8070',1.5,'5,4'));parts.push(sLine(A,C2w,'#3a8070',1.5,'5,4'));
    const cx=_W/2,ew=Math.min(_W-20,360);
    parts.push(`<rect x="${(cx-ew/2).toFixed(0)}" y="12" width="${ew}" height="28" rx="5" fill="rgba(191,50,50,.9)"/>`);
    parts.push(`<text x="${cx.toFixed(0)}" y="26" text-anchor="middle" dominant-baseline="middle" font-size="11.5" font-weight="700" fill="white">Nur Winkel: beliebig skalierbar \u2013 WWW ist kein Kongruenzsatz!</text>`);
  }
}

// ── MAIN DISPATCH ────────────────────────────────────
function maxSteps(){return currentCase==='WWW'?2:4;}

let _drawReq=0;
function drawSketch(){
  cancelAnimationFrame(_drawReq);
  _drawReq=requestAnimationFrame(()=>{
    const wrap=document.getElementById('svg-wrap');
    if(selectedParts.length!==3){wrap.innerHTML='';return;}
    const sl=document.getElementById('step-slider');
    const ms=maxSteps(),s=Math.min(parseInt(sl.value),ms);
    sl.max=ms;document.getElementById('step-label').textContent=s+'/'+ms;
    const sp2=document.getElementById('show-aux').checked;
    const W=wrap.clientWidth||600,H=wrap.clientHeight||400;
    if(!W||!H)return;
    const geo=computeGeometry();
    setTfm(computeTransform(geo,W,H),W,H);
    const parts=[];
    switch(currentCase){
      case 'SSS': drawSSS(parts,geo,s,sp2);break;
      case 'SWS': drawSWS(parts,geo,s,sp2);break;
      case 'WSW':case 'SWW': drawWSW(parts,geo,s,sp2);break;
      case 'SsW':case 'sSw': drawSSA(parts,geo,s,sp2);break;
      case 'WWW': drawWWW(parts,geo,s);break;
    }
    document.getElementById('sketch-desc').textContent=getStepDesc(s,geo);
    wrap.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}"><defs><clipPath id="cl"><rect width="${W}" height="${H}"/></clipPath></defs><g clip-path="url(#cl)">${parts.join('')}</g></svg>`;
  });
}

// ── STEP DESCRIPTIONS ────────────────────────────────
function getStepDesc(step,geo){
  const{a,b,c,alpha,beta,gamma,givenS,givenA,valid,reason,C2}=geo;
  const h=c*Math.sin(rad(alpha));
  const d=[];
  if(currentCase==='SSS'){
    d[0]='Schritt-Regler: Konstruktionsschritte anzeigen.';
    d[1]='Schritt 1: Grundseite AB = c = '+e1(c)+' cm zeichnen.';
    d[2]='Schritt 2: Kreisbogen um A, Radius b = '+e1(b)+' cm einzeichnen.';
    d[3]='Schritt 3: Kreisbogen um B, Radius a = '+e1(a)+' cm \u2192 Schnittpunkt C.';
    d[4]=valid?'Schritt 4: Fertig! SSS \u2192 eindeutig bestimmt.':'Kein Dreieck! '+reason;
  } else if(currentCase==='SWS'){
    const ang=givenA[0];
    if(ang==='alpha'){d[1]='Schritt 1: AB = c = '+e1(c)+' cm.';d[2]='Schritt 2: Strahl von A unter \u03b1 = '+e0(alpha)+'\u00b0 anlegen.';d[3]='Schritt 3: b = '+e1(b)+' cm auf dem Strahl abtragen \u2192 C.';d[4]='Schritt 4: Fertig! SWS \u2192 eindeutig.';}
    else if(ang==='beta'){d[1]='Schritt 1: AB = c = '+e1(c)+' cm.';d[2]='Schritt 2: Strahl von B unter \u03b2 = '+e0(beta)+'\u00b0 anlegen.';d[3]='Schritt 3: a = '+e1(a)+' cm auf dem Strahl abtragen \u2192 C.';d[4]='Schritt 4: Fertig! SWS \u2192 eindeutig.';}
    else{d[1]='Schritt 1: Punkt C, Winkel \u03b3 = '+e0(gamma)+'\u00b0 anlegen.';d[2]='Schritt 2: b = '+e1(b)+' cm auf einem Schenkel \u2192 A.';d[3]='Schritt 3: a = '+e1(a)+' cm auf dem anderen Schenkel \u2192 B.';d[4]='Schritt 4: AB = c = '+e1(c)+' cm verbinden. SWS \u2192 eindeutig.';}
  } else if(currentCase==='WSW'||currentCase==='SWW'){
    const base=givenS[0];
    const mStr=currentCase==='SWW'?' (fehlender Winkel berechenbar)':'';
    if(base==='c'){d[1]='Schritt 1: AB = c = '+e1(c)+' cm.'+mStr;d[2]='Schritt 2: Strahl von A unter \u03b1 = '+e0(alpha)+'\u00b0.';d[3]='Schritt 3: Strahl von B unter \u03b2 = '+e0(beta)+'\u00b0 \u2192 C.';d[4]=valid?'Schritt 4: Fertig! '+currentCase+' \u2192 eindeutig.':'Kein Dreieck! '+reason;}
    else if(base==='b'){d[1]='Schritt 1: AC = b = '+e1(b)+' cm.'+mStr;d[2]='Schritt 2: Strahl von A unter \u03b1 = '+e0(alpha)+'\u00b0.';d[3]='Schritt 3: Strahl von C unter \u03b3 = '+e0(gamma)+'\u00b0 \u2192 B.';d[4]=valid?'Schritt 4: Fertig! '+currentCase+' \u2192 eindeutig.':'Kein Dreieck! '+reason;}
    else{d[1]='Schritt 1: BC = a = '+e1(a)+' cm.'+mStr;d[2]='Schritt 2: Strahl von B unter \u03b2 = '+e0(beta)+'\u00b0.';d[3]='Schritt 3: Strahl von C unter \u03b3 = '+e0(gamma)+'\u00b0 \u2192 A.';d[4]=valid?'Schritt 4: Fertig! '+currentCase+' \u2192 eindeutig.':'Kein Dreieck! '+reason;}
  } else if(currentCase==='SsW'||currentCase==='sSw'){
    const angK=givenA[0];
    const oppK={alpha:'a',beta:'b',gamma:'c'}[angK];
    const adjK=givenS.find(s=>s!==oppK);
    const thirdK=['a','b','c'].find(s=>s!==oppK&&s!==adjK);
    const sideV={c:['A','B'],b:['A','C'],a:['B','C']};
    const adjVNs=sideV[adjK];
    const angVN={alpha:'A',beta:'B',gamma:'C'}[angK];
    const circVN=adjVNs.find(v=>v!==angVN);
    const angSym={alpha:'\u03b1',beta:'\u03b2',gamma:'\u03b3'}[angK];
    const adjVal_={a,b,c}[adjK],oppVal_={a,b,c}[oppK];
    const angDeg=Math.round({alpha,beta,gamma}[angK]);
    const h2=adjVal_*Math.sin(rad({alpha,beta,gamma}[angK]));
    d[1]='Schritt 1: '+adjVNs[0]+adjVNs[1]+' = '+adjK+' = '+e1(adjVal_)+' cm zeichnen.';
    d[2]='Schritt 2: Strahl von '+angVN+' unter '+angSym+'='+angDeg+'\u00b0 anlegen.';
    d[3]='Schritt 3: Kreisbogen um '+circVN+', Radius '+oppK+'='+e1(oppVal_)+' cm (h\u2248'+e1(h2)+' cm).';
    d[4]=!valid?'Kein Dreieck! '+reason:C2?'Schritt 4: Zwei Schnittpunkte \u2192 zweideutig! (sSw)':currentCase==='SsW'?'Schritt 4: Eindeutig (SsW). Fertig!':'Schritt 4: Grenzfall. Fertig!';
  } else if(currentCase==='WWW'){
    d[1]='Schritt 1: Dreieck mit \u03b1='+e0(alpha)+'\u00b0, \u03b2='+e0(beta)+'\u00b0, \u03b3='+e0(gamma)+'\u00b0.';
    d[2]='Schritt 2: Gleiches Dreieck anders skaliert \u2013 WWW ist kein Kongruenzsatz!';
  }
  return d[step]||d[0]||'';
}

// ── QUIZ ─────────────────────────────────────────────
function buildQuiz(){
  const q1=document.getElementById('q1-btns');q1.innerHTML='';
  ['SSS','SWS','WSW','SWW','SsW','Kein'].forEach(opt=>{
    const b=document.createElement('button');
    b.className='ans-btn'+(opt==='Kein'?' nonks':'');
    b.textContent=opt;
    b.onclick=()=>handleQ1(opt,b);q1.appendChild(b);
  });
  document.getElementById('q1-fb').className='quiz-fb';document.getElementById('q1-fb').innerHTML='';
  document.getElementById('quiz-step2').style.display='none';
  document.getElementById('quiz-done').style.display='none';
}
const HINTS={
  SSS:'Drei Seiten \u2192 Dreiecksungleichung muss gelten.',
  SWS:'Zwei Seiten + eingeschlossener Winkel \u2192 Kongruenzsatz.',
  WSW:'Seite liegt ZWISCHEN beiden Winkeln \u2192 Kongruenzsatz.',
  SWW:'Zwei Winkel + Seite \u2192 fehlenden Winkel berechnen, dann wie WSW.',
  SsW:'Winkel gegen\u00fcber der GR\u00d6\u00deSREN Seite.',
  sSw:'Winkel ggü. der KLEINEREN Seite \u2013 kein Kongruenzsatz!',
  WWW:'Nur Winkel: beliebig skalierbar \u2013 kein Kongruenzsatz!'
};
function handleQ1(chosen,btnEl){
  if(quizState.q1done)return;quizState.q1done=true;
  const cs=currentCase;
  const cMap={SSS:'SSS',SWS:'SWS',WSW:'WSW',SWW:'SWW',SsW:'SsW',sSw:'Kein',WWW:'Kein'};
  const correct=cMap[cs]||'Kein';
  const ok=chosen===correct;
  document.querySelectorAll('#q1-btns .ans-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('reveal');
    if(b===btnEl&&ok){b.classList.remove('reveal');b.classList.add('correct');}
    if(b===btnEl&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('q1-fb');
  fb.className='quiz-fb '+(ok?'ok':'err');
  fb.innerHTML=ok?'<strong>\u2713 Richtig!</strong> '+(HINTS[cs]||''):'<strong>\u2717 Falsch.</strong> Richtig: <em>'+correct+'</em>. '+(HINTS[cs]||'');
  setTimeout(()=>showQ2(),380);
}
function showQ2(){
  document.getElementById('quiz-step2').style.display='';
  document.getElementById('q2-text').textContent='Ist das Dreieck mit diesen Werten konstruierbar?';
  const opts=[
    {k:'eindeutig',l:'\u2713 Eindeutig \u2013 genau ein Dreieck'},
    {k:'zweideutig',l:'\u26a1 Zweideutig \u2013 zwei Dreiecke'},
    {k:'kein',l:'\u2717 Nicht m\u00f6glich \u2013 kein Dreieck'}
  ];
  const q2=document.getElementById('q2-btns');q2.innerHTML='';
  opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='ans-btn';b.textContent=o.l;
    b.onclick=()=>handleQ2(o.k,b,opts);q2.appendChild(b);
  });
  document.getElementById('q2-fb').className='quiz-fb';document.getElementById('q2-fb').innerHTML='';
}
function handleQ2(chosen,btnEl,opts){
  if(quizState.q2done)return;quizState.q2done=true;
  const geo=computeGeometry();
  const correct=!geo.valid?'kein':(geo.C2&&isFinite(geo.C2.x)&&isFinite(geo.C2.y)?'zweideutig':'eindeutig');
  const ok=chosen===correct;
  document.querySelectorAll('#q2-btns .ans-btn').forEach((b,i)=>{
    b.disabled=true;
    if(opts[i].k===correct)b.classList.add('reveal');
    if(b===btnEl&&ok){b.classList.remove('reveal');b.classList.add('correct');}
    if(b===btnEl&&!ok)b.classList.add('wrong');
  });
  const expl={eindeutig:'Dreieck eindeutig konstruierbar \u2713',zweideutig:'sSW: Kreisbogen schneidet Strahl zweimal \u2192 zwei L\u00f6sungen!',kein:'Dreiecksungleichung / Winkelsumme verletzt oder Kreisbogen erreicht Strahl nicht.'}[correct];
  const lbl={eindeutig:'Eindeutig',zweideutig:'Zweideutig',kein:'Nicht m\u00f6glich'}[correct];
  const fb=document.getElementById('q2-fb');
  fb.className='quiz-fb '+(ok?'ok':'err');
  fb.innerHTML=ok?'<strong>\u2713 Richtig!</strong> '+expl:'<strong>\u2717 Falsch.</strong> Richtig: <em>'+lbl+'</em>. '+expl;
  document.getElementById('quiz-done').style.display='';
}

// ── RANDOM ───────────────────────────────────────────
function generateRandomValues(){
  const enabled=[...document.querySelectorAll('#case-filter input:checked')].map(i=>i.value);
  if(!enabled.length)return;
  const ai=document.getElementById('allow-impossible').checked;
  let pool=[...enabled];
  if(ai){
    if(enabled.includes('SSS'))pool.push('SSS_BAD');
    // WANG_BAD only for the specific enabled impossible combos
    if(enabled.includes('WSW'))pool.push('WSW_BAD');
    if(enabled.includes('SWW'))pool.push('SWW_BAD');
    if(enabled.includes('sSw'))pool.push('sSw_BAD');
    // WWW only when checkbox active AND all 5 real Kongruenzsaetze active
    const allFive=['SSS','SWS','WSW','SWW','SsW'].every(k=>enabled.includes(k));
    if(allFive)pool.push('WWW');
  }
  for(let t=0;t<80;t++){const r=tryGen(pool[Math.floor(Math.random()*pool.length)]);if(r){selectedParts=r.p;Object.assign(currentValues,r.v);syncChipStyles();renderInputs();return;}}
}

// WSW combos: side between both angles
// c adj to alpha,beta → [c,alpha,beta]
// b adj to alpha,gamma → [b,alpha,gamma]
// a adj to beta,gamma → [a,beta,gamma]
const WSW_COMBOS=[['c','alpha','beta'],['b','alpha','gamma'],['a','beta','gamma']];
// SWW combos: side NOT between both angles (at least one angle not adjacent)
// With side c (adj:alpha,beta): gamma not adj → [c,alpha,gamma],[c,beta,gamma]
// With side b (adj:alpha,gamma): beta not adj → [b,alpha,beta],[b,beta,gamma]
// With side a (adj:beta,gamma): alpha not adj → [a,alpha,beta],[a,alpha,gamma]
const SWW_COMBOS=[['c','alpha','gamma'],['c','beta','gamma'],['b','alpha','beta'],['b','beta','gamma'],['a','alpha','beta'],['a','alpha','gamma']];
// SsW/sSw combos: [oppSide, otherSide, angle] where angle's opp = oppSide
// alpha opp=a: [a,b,alpha],[a,c,alpha]
// beta opp=b: [b,a,beta],[b,c,beta]
// gamma opp=c: [c,a,gamma],[c,b,gamma]
const SSA_COMBOS=[['a','b','alpha'],['a','c','alpha'],['b','a','beta'],['b','c','beta'],['c','a','gamma'],['c','b','gamma']];

function tryGen(ct){
  switch(ct){
    case 'SSS':{
      for(let i=0;i<30;i++){const a=rf(rnd(2.5,8)),b=rf(rnd(2.5,8)),c=rf(rnd(2.5,8));
        const s=[a,b,c].sort((x,y)=>x-y);if(s[0]+s[1]>s[2]+0.4)return{p:['a','b','c'],v:{a,b,c}};}
      break;}
    case 'SSS_BAD':{
      const c=rf(rnd(9,13)),a=rf(rnd(1.5,3)),b=rf(rnd(1.5,3));
      return{p:['a','b','c'],v:{a,b,c}};}
    case 'SWS':{
      const opts=[['b','c','alpha'],['a','c','beta'],['a','b','gamma']];
      const ch=opts[rndI(0,2)];
      for(let i=0;i<15;i++){
        const av=rndI(35,115),sv1=rf(rnd(2.5,8)),sv2=rf(rnd(2.5,8));
        const opp2=sv1*sv1+sv2*sv2-2*sv1*sv2*Math.cos(rad(av));
        if(opp2>0.5)return{p:ch,v:{[ch[0]]:sv1,[ch[1]]:sv2,[ch[2]]:av}};}
      break;}
    case 'WSW':{
      const ch=WSW_COMBOS[rndI(0,2)];// [side,ang1,ang2]
      for(let i=0;i<20;i++){
        const a1=rndI(25,85),a2=rndI(25,85);
        if(a1+a2<170){const sv=rf(rnd(3,10));
          return{p:ch,v:{[ch[0]]:sv,[ch[1]]:a1,[ch[2]]:a2}};}}
      break;}
    case 'WSW_BAD':{
      const ch=WSW_COMBOS[rndI(0,2)];
      const sv=rf(rnd(3,9)),a1=rndI(90,120),a2=rndI(80,110);
      return{p:ch,v:{[ch[0]]:sv,[ch[1]]:a1,[ch[2]]:a2}};}
    case 'SWW':{
      const ch=SWW_COMBOS[rndI(0,5)];// [side,ang1,ang2]
      for(let i=0;i<20;i++){
        const a1=rndI(25,80),a2=rndI(25,80);
        if(a1+a2<165){const sv=rf(rnd(3,10));
          return{p:ch,v:{[ch[0]]:sv,[ch[1]]:a1,[ch[2]]:a2}};}}
      break;}
    case 'SWW_BAD':{
      const ch=SWW_COMBOS[rndI(0,5)];
      const sv=rf(rnd(3,9)),a1=rndI(90,120),a2=rndI(80,110);
      return{p:ch,v:{[ch[0]]:sv,[ch[1]]:a1,[ch[2]]:a2}};}
    case 'SsW':{
      // SsW: opp >= adj side → pick combo and ensure values satisfy
      const ch=SSA_COMBOS[rndI(0,5)];// [oppSide,adjSide,angle]
      const ang=ch[2],angV=rndI(20,70);
      for(let i=0;i<20;i++){
        const adj=rf(rnd(3,9)),opp=rf(adj+rnd(0.3,3));
        const h=adj*Math.sin(rad(angV));
        if(opp>h+0.1)return{p:[ch[0],ch[1],ang],v:{[ch[0]]:opp,[ch[1]]:adj,[ang]:angV}};}
      break;}
    case 'sSw':{
      const ch=SSA_COMBOS[rndI(0,5)];
      const ang=ch[2],angV=rndI(20,60);
      for(let i=0;i<30;i++){
        const adj=rf(rnd(5,10));
        const h=adj*Math.sin(rad(angV)),margin=(adj-h)*0.7;
        if(margin<0.1)continue;
        const opp=rf(h+rnd(0.1,Math.max(0.15,margin)));
        if(opp<adj)return{p:[ch[0],ch[1],ang],v:{[ch[0]]:opp,[ch[1]]:adj,[ang]:angV}};}
      break;}
    case 'sSw_BAD':{
      const ch=SSA_COMBOS[rndI(0,5)];
      const ang=ch[2],angV=rndI(25,65);
      const adj=rf(rnd(5,10)),h=adj*Math.sin(rad(angV));
      const opp=rf(Math.max(0.3,h*rnd(0.2,0.85)));
      return{p:[ch[0],ch[1],ang],v:{[ch[0]]:opp,[ch[1]]:adj,[ang]:angV}};}
    case 'WWW':{
      const alpha=rndI(35,80),beta=rndI(35,80),gamma=180-alpha-beta;
      if(gamma>5)return{p:['alpha','beta','gamma'],v:{alpha,beta,gamma}};
      break;}
  }
  return null;
}

renderInputs();
window.addEventListener('resize',()=>{if(selectedParts.length===3)drawSketch();});
