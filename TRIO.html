<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trio</title>
<style>

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  height: 100vh;
  background-color: #f4f4f4;
  overflow: hidden; /* Verhindert zusätzliches Scrollen */
}
.button-container {
  display: flex;
  justify-content: center;
  margin-top: 5px;
}
button {
  font-size: 1rem;
  padding: 10px 20px;
  margin: 0 5px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}
#neu-button {
  background-color: hsl(60, 100%, 80%); /* Gelb */
}
#zufallszahl-button {
  background-color: hsl(240, 100%, 80%); /* Blau */
}
#trio-container {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(10, 1fr);
  gap: 1px;
  border: 1px solid #999;
  margin-top: 30px;
  width: min(90vw, 70vh); /* Container skaliert basierend auf Viewport */
  aspect-ratio: 1 / 1;    /* Hält die Tabelle quadratisch */
}
.trio-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(12px, 4cqi, 40px); /* Schriftgröße skaliert relativ zur Containerbreite */
  font-weight: bold;
  border: 1px solid #999;
  color: #333;
  container-type: size; /* Ermöglicht cqi-Einheiten */
}
.label-cell {
  background-color: #f0f0f0;
}
#random-number {
  margin-top: 5px;
  margin-bottom: 5px;
  font-size: 1.6rem;
}
  
#lobby-spacer { 
  flex: 1 1 0; 
  min-height: 0; 
}
.site-footer {
  width: 100%; box-sizing: border-box; padding: 15px 15px;
  border-top: 1px solid #ccc; margin-top: 4px; margin-bottom: 0px;
  font-family: sans-serif; font-size: 0.6em; color: #333333d8;
}
.footer-content {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  margin: 0 auto;
  max-width: min(90vw, 70vh);
}
.footer-content > :first-child {
  justify-self: start;
}
.footer-content > :nth-child(2) {
  justify-self: center;
}
.footer-content > :last-child {
  justify-self: end;
}
.footer-topic a { 
  color: inherit; 
  text-decoration: underline; 
}
</style>
</head>
<body>

<div id="trio-container"></div>
<div class="button-container">
  <button id="neu-button">Neu</button>
  <button id="zufallszahl-button">Zufallszahl</button>
</div>
<div id="random-number"></div>

<script>
  const neuButton = document.getElementById('neu-button');
  const zufallszahlButton = document.getElementById('zufallszahl-button');
  const trioContainer = document.getElementById('trio-container');
  const randomNumberDisplay = document.getElementById('random-number');

  neuButton.addEventListener('click', generateTrio);
  zufallszahlButton.addEventListener('click', generateRandomNumber);

  function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1)); // Zufälliger Index von 0 bis i
    [array[i], array[j]] = [array[j], array[i]];   // Elemente tauschen
  }
}

  function generateTrio() {
  trioContainer.innerHTML = '';
  const gridSize = 9;
  const labels = 'ABCDEFGHI'.split('');

  // Platz für Buttons und Ränder abziehen (~150px für obere Leiste, Buttons etc.)
  const availableHeight = window.innerHeight - 150;
  const availableWidth = window.innerWidth - 20;

  const maxCellSize = Math.min(availableHeight, availableWidth) / 10 - 2;

  const cellSize = Math.floor(maxCellSize); // Damit es ganzzahlig bleibt

  const numbers = Array.from({ length: 9 }, (_, i) => i + 1).flatMap(x => Array(9).fill(x));
  shuffle(numbers);

  for (let row = 0; row <= gridSize; row++) {
    for (let col = 0; col <= gridSize; col++) {
      const cell = document.createElement('div');
      cell.classList.add('trio-cell');
      // cell.style.width = cellSize + 'px';
      // cell.style.height = cellSize + 'px';
      // cell.style.fontSize = (cellSize * 0.6) + 'px'; // Dynamisch skalieren

      if (row === 0 && col > 0) {
        cell.textContent = labels[col - 1];
        cell.classList.add('label-cell');
      } else if (col === 0 && row > 0) {
        cell.textContent = row + ':';
        cell.classList.add('label-cell');
      } else if (row === 0 && col === 0) {
        cell.classList.add('label-cell');
      } else {
        const number = numbers[(row - 1) * 9 + (col - 1)];
        cell.textContent = number;
        cell.style.backgroundColor = getCellColor(number);
      }

      trioContainer.appendChild(cell);
    }
  }
}

  function getCellColor(number) {
    const hue = (number - 1) / 8 * 240; // 1 -> 0° (red), 9 -> 240° (blue)
    return `hsl(${hue}, 100%, 90%)`; // Very light colors
  }

  function generateRandomNumber() {
    const randomNum = Math.floor(Math.random() * 50) + 51;
    randomNumberDisplay.textContent = 'Zufallszahl: ' + randomNum;
  }
  generateTrio();
</script>

<div id="lobby-spacer"></div>
<footer class="site-footer">
  <div class="footer-content">
      M.&nbsp;Koch
      <span class="footer-topic"><a href="./index.html">Mathe-Tools</a></span>
      <span class="footer-update">Last updated:&nbsp;<span id="last-update">...</span></span>
  </div>
</footer>
<script src="last-update.js" defer></script>

</body>
</html>
