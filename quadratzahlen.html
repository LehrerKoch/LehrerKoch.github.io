<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  </script>

  <title>Quadratzahlen Übungsaufgaben</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <style>
    .site-footer {
      width: 100%; box-sizing: border-box; padding: 12px 40px;
      border-top: 1px solid #ccc; margin-top: 20px; margin-bottom: 10px;
      font-family: sans-serif; font-size: 0.6em; color: #333333d8;
    }
    .footer-content {
      display: flex; justify-content: center; align-items: center;
      gap: 1.5rem; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; text-align: center;
    }
    @media (max-width: 600px) { .footer-content { flex-direction: column; gap: 6px; } }

    body { font-family: sans-serif; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
    *:focus { outline: none; }
    #showSolutionBtn:focus { outline: 2px solid black; }

    #flashOverlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0; transition: opacity 1s;
    }
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 12px 24px; border-radius: 10px;
      font-size: 0.95em; opacity: 0; pointer-events: none;
      transition: opacity 0.4s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* Card area */
    #taskWrap {
      position: relative; width: 100%; height: 160px; margin-top: 20px;
      border: 1px solid #eee; border-radius: 10px; perspective: 1000px; z-index: 1;
    }
    #wrongBtn, #correctBtn {
      position: absolute; top: 0; bottom: 0; width: 100px;
      border: none; font-size: 0.9em; z-index: 1; cursor: pointer;
    }
    #wrongBtn  { left: 0;  background-color: #f8d7da; color: #721c24; }
    #correctBtn{ right: 0; background-color: #d4edda; color: #155724; }

    #taskCard {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      text-align: center; border-radius: 15px; cursor: grab;
      width: calc(100% - 220px); max-width: 360px; height: 90%;
      z-index: 2; box-sizing: border-box;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    #taskCard.flipped { transform: translate(-50%, -50%) rotateY(180deg); }

    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 2px solid #ddd; border-radius: 15px; background: white;
      transition: background-color 0.2s ease;
    }
    .card-back { transform: rotateY(180deg); background-color: #fcfcfc; }

    .card-formula      { font-size: 1.6em; }
    .card-formula-back { font-size: 1.4em; }
    .card-sub          { font-size: 0.75em; color: #888; margin-top: 4px; }

    #showSolutionBtn { width: 100%; margin-top: 15px; padding: 10px; cursor: pointer; }

    /* Settings */
    .radio-group { display: inline-flex; border-radius: 6px; overflow: hidden; border: 2px solid #4CAF50; margin: 6px 0 12px 0; }
    .radio-group label { display: flex; align-items: center; padding: 5px 11px; font-weight: normal; font-size: 0.85em; cursor: pointer; background: #fff; border-right: 1px solid #4CAF50; transition: background 0.15s; line-height: 1.3; user-select: none; }
    .radio-group label:last-child { border-right: none; }
    .radio-group label:hover { background: #f1fbf1; }
    .radio-group input[type="radio"] { display: none; }
    .radio-group label:has(input:checked) { background: #4CAF50; color: #fff; }
  </style>
</head>
<body>
  <div id="flashOverlay"></div>
  <div id="toast"></div>
  <div style="position:relative; z-index:1;">

  <h1>Quadratzahlen Übungsaufgaben</h1>

  <details>
    <summary>Settings</summary>
    <form id="settingsForm">
      <div class="form-block">
        <b>Zahlenbereiche:</b><br>
        <button type="button" onclick="toggleRange(1,10)">1–10</button><br>
        <div id="range1_10"></div>
        <button type="button" onclick="toggleRange(11,20)">11–20</button><br>
        <div id="range11_20"></div>
        <button type="button" onclick="toggleRange(21,25)">21–25</button><br>
        <div id="range21_25"></div>
      </div>

      <div class="form-block">
        <b>Optionen:</b><br>
        <input type="checkbox" id="multifactor"> Auch 10-, 100-, 1000-fach<br>
        <input type="checkbox" id="fractional"> Auch Zehntel, Hundertstel, Tausendstel<br>
      </div>

      <div class="form-block">
        <b>Aufgabentyp:</b><br>
        <div class="radio-group">
          <label><input type="radio" name="wurzelmode" value="none" checked> Keine Wurzelaufgaben</label>
          <label><input type="radio" name="wurzelmode" value="both"> Auch Wurzelaufgaben</label>
          <label><input type="radio" name="wurzelmode" value="only"> Nur Wurzelaufgaben</label>
        </div>
      </div>
    </form>
  </details>

  <p id="taskLabel" style="text-align:center; margin-top:20px; font-weight:bold;">Wähle Zahlen und starte…</p>
  <p id="counter"   style="text-align:center; font-weight:bold;">Richtig: 0 / 0</p>

  <div id="taskWrap">
    <button id="wrongBtn">Noch unsicher</button>
    <div id="taskCard">
      <div class="card-face" id="faceFront">
        <div id="taskText" class="card-formula"></div>
        <div class="card-sub" id="taskSub"></div>
      </div>
      <div class="card-face card-back" id="faceBack">
        <div id="taskTextBack" class="card-formula" style="opacity:0.25; font-size:1em;"></div>
        <div id="loesung" class="card-formula-back" style="margin-top:8px;"></div>
      </div>
    </div>
    <button id="correctBtn">Kann ich sicher</button>
  </div>

  <button id="showSolutionBtn" class="btn">Lösung anzeigen</button>

  </div>

<script>
/* ── Helpers ─────────────────────────────────────── */
function roundNumber(x, d = 6) { return Number.parseFloat(x.toFixed(d)); }
function randomChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showToast(msg, duration = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function flashResult(color) {
  const ov = document.getElementById('flashOverlay');
  ov.style.transition = 'none';
  ov.style.backgroundColor = color;
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.transition = 'opacity 1s'; ov.style.opacity = '0'; }, 50);
}

/* ── Settings / Checkboxes ───────────────────────── */
function makeCheckboxes(containerId, start, end) {
  const container = document.getElementById(containerId);
  for (let i = start; i <= end; i++) {
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.name = 'num'; cb.value = i;
    cb.addEventListener('change', () => { updateURLParams(); onSettingsChange(); });
    container.appendChild(cb);
    container.appendChild(document.createTextNode(' ' + i + ' '));
  }
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    selectedNums: p.has('nums') ? p.get('nums').split(',').map(Number) : [],
    multifactor:  p.get('multifactor') === '1',
    fractional:   p.get('fractional')  === '1',
    wurzelmode:   p.has('wurzelmode') ? p.get('wurzelmode') : 'none'
  };
}

function updateURLParams() {
  const q = new URLSearchParams();
  const sel = [];
  document.querySelectorAll('input[name=num]:checked').forEach(cb => sel.push(cb.value));
  if (sel.length) q.set('nums', sel.join(','));
  q.set('multifactor', document.getElementById('multifactor').checked ? '1' : '0');
  q.set('fractional',  document.getElementById('fractional').checked  ? '1' : '0');
  q.set('wurzelmode',  document.querySelector('input[name="wurzelmode"]:checked').value);
  history.replaceState({}, '', window.location.pathname + '?' + q.toString());
}

function toggleRange(start, end) {
  const cbs = document.querySelectorAll('input[name=num][value]');
  let allOn = true;
  cbs.forEach(cb => { const v = parseInt(cb.value); if (v >= start && v <= end && !cb.checked) allOn = false; });
  cbs.forEach(cb => { const v = parseInt(cb.value); if (v >= start && v <= end) cb.checked = !allOn; });
  updateURLParams(); onSettingsChange();
}

function onSettingsChange() {
  refillPool();
  window.currentN = null;
  document.getElementById('taskLabel').textContent = 'Einstellungen geändert – neue Aufgabe…';
  document.getElementById('taskText').innerHTML = '';
  document.getElementById('loesung').innerHTML = '';
  faces.forEach(f => f.style.backgroundColor = 'white');
  card.removeAttribute('style');
  card.classList.remove('flipped');
  setTimeout(generateSquare, 100);
}

/* ── Pool ────────────────────────────────────────── */
let taskPool = [];
let korrekteAntworten = 0, anzahlAufgaben = 0;
let lastN = null;

function refillPool() {
  const baseNums = Array.from(document.querySelectorAll('input[name=num]:checked'))
                        .map(cb => parseInt(cb.value)).filter(n => !isNaN(n));
  const mult = document.getElementById('multifactor').checked;
  const frac = document.getElementById('fractional').checked;
  const all = [];
  baseNums.forEach(n => {
    all.push(n);
    if (mult) all.push(n*10, n*100, n*1000);
    if (frac) all.push(n/10, n/100, n/1000);
  });
  taskPool = Array.from(new Set(all));
}

function updateCounterDisplay() {
  document.getElementById('counter').textContent = `Richtig: ${korrekteAntworten} / ${anzahlAufgaben}`;
}

/* ── Flip Card references ────────────────────────── */
const card  = document.getElementById('taskCard');
const faces = document.querySelectorAll('.card-face');

/* ── Task generation ─────────────────────────────── */
function generateSquare() {
  document.getElementById('loesung').innerHTML = '';

  if (taskPool.length === 0) {
    const baseNums = Array.from(document.querySelectorAll('input[name=num]:checked'));
    if (baseNums.length === 0) {
      document.getElementById('taskLabel').textContent = 'Bitte Zahlen im Settings-Bereich auswählen.';
      document.getElementById('taskText').innerHTML = '';
      return;
    }
    refillPool();
    showToast('🎉 Alle Aufgaben geschafft! Stapel wird neu gemischt…');
  }

  let n;
  do { n = randomChoice(taskPool); } while (taskPool.length > 1 && n === lastN);
  lastN = n;
  window.currentN = n;

  const wurzelMode = document.querySelector('input[name="wurzelmode"]:checked').value;
  const squared = roundNumber(n * n);
  let aufgabe, loesung;

  if (wurzelMode === 'none') {
    aufgabe = `${n}^2 = \\,?`;
    loesung = `${n}^2 = ${squared}`;
  } else if (wurzelMode === 'only') {
    aufgabe = `\\sqrt{${squared}} = \\,?`;
    loesung = `\\sqrt{${squared}} = ${n}`;
  } else {
    if (Math.random() < 0.5) {
      aufgabe = `${n}^2 = \\,?`;
      loesung = `${n}^2 = ${squared}`;
    } else {
      aufgabe = `\\sqrt{${squared}} = \\,?`;
      loesung = `\\sqrt{${squared}} = ${n}`;
    }
  }

  window.currentSolution = null; // erst nach Flip verfügbar

  // Lösung sofort setzen
  window.currentSolution = `$$${loesung}$$`;
  
  document.getElementById('taskLabel').textContent = 'Berechne:';

  // Sofort: Vorderseite befüllen + zurückblättern
  document.getElementById('taskText').innerHTML = `$$${aufgabe}$$`;
  document.getElementById('taskSub').textContent = '';
  faces.forEach(f => f.style.backgroundColor = 'white');
  card.removeAttribute('style');
  card.classList.remove('flipped');
  if (window.MathJax) MathJax.typeset();

  // Nach 600ms (Rückseite nicht mehr sichtbar): Rückseite befüllen
  setTimeout(() => {
    document.getElementById('loesung').innerHTML = '';
    // document.getElementById('taskTextBack').innerHTML = `$$${aufgabe}$$`;
    window.currentSolution = `$$${loesung}$$`;
    if (window.MathJax) MathJax.typeset();
  }, 600);

  updateCounterDisplay();
}

/* ── Solution / answer ───────────────────────────── */
function showSolution() {
  if (!window.currentSolution) return;
  document.getElementById('loesung').innerHTML = window.currentSolution;
  card.classList.add('flipped');
  if (window.MathJax) MathJax.typeset();
}

function markAnswer(correct) {
  if (!window.currentN) return;
  flashResult(correct ? '#d4edda' : '#f8d7da');

  if (correct) {
    korrekteAntworten++;
    const idx = taskPool.indexOf(window.currentN);
    if (idx !== -1) taskPool.splice(idx, 1);
  }
  anzahlAufgaben++;
  window.currentN = null;

  showSolution();
  updateCounterDisplay();
  setTimeout(generateSquare, 1200);
}

function toggleSolution() {
  if (!window.currentSolution) return;
  if (card.classList.contains('flipped')) {
    card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
    card.classList.remove('flipped');
  } else {
    requestAnimationFrame(() => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      requestAnimationFrame(() => { showSolution(); });
    });
  }
}

/* ── Drag / swipe ────────────────────────────────── */
let startX = null, currentX = 0, startTime = 0, ignoreMouseUp = false;

card.onmousedown = (e) => { startTime = Date.now(); handleStart(e); };
card.onmouseup   = (e) => {
  if (ignoreMouseUp) { ignoreMouseUp = false; return; }
  const duration = Date.now() - startTime;
  if (duration < 250 && Math.abs(currentX) < 20) {
    startX = null; currentX = 0;
    requestAnimationFrame(() => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      requestAnimationFrame(() => { showSolution(); });
    });
    return;
  }
  handleEnd();
};
card.ontouchstart = (e) => { startTime = Date.now(); handleStart(e); };
card.ontouchend   = (e) => {
  ignoreMouseUp = true;
  const duration = Date.now() - startTime;
  if (duration < 250 && Math.abs(currentX) < 20) {
    startX = null; currentX = 0;
    requestAnimationFrame(() => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      requestAnimationFrame(() => { showSolution(); });
    });
    return;
  }
  handleEnd();
};

const handleStart = (e) => { startX = e.clientX || (e.touches && e.touches[0].clientX); card.style.transition = 'none'; };
const handleMove  = (e) => {
  if (startX === null) return;
  currentX = (e.clientX || (e.touches && e.touches[0].clientX)) - startX;
  const rot = card.classList.contains('flipped') ? 180 : 0;
  card.style.transform = `translate(calc(-50% + ${currentX}px), -50%) rotateY(${rot}deg)`;
  const intensity = Math.min(Math.abs(currentX) / (card.parentElement.offsetWidth * 0.25), 0.8);
  faces.forEach(f => f.style.backgroundColor = currentX > 0 ? `rgba(212,237,218,${intensity})` : `rgba(248,215,218,${intensity})`);
};
const handleEnd = () => {
  if (startX === null) return;
  const threshold = card.parentElement.offsetWidth * 0.25;
  const triggered = currentX > threshold || currentX < -threshold;
  const wasCorrect = currentX > 0;
  faces.forEach(f => f.style.backgroundColor = 'white');
  card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
  if (triggered) {
    markAnswer(wasCorrect);
    requestAnimationFrame(() => {
      card.style.transform = `translate(-50%, -50%) rotateY(${card.classList.contains('flipped') ? 180 : 0}deg)`;
      setTimeout(() => { card.removeAttribute('style'); }, 600);
    });
  } else {
    card.style.transform = `translate(-50%, -50%) rotateY(${card.classList.contains('flipped') ? 180 : 0}deg)`;
    setTimeout(() => { if (startX === null) card.removeAttribute('style'); }, 600);
  }
  startX = null; currentX = 0;
};
document.onmousemove = handleMove;
card.ontouchmove = handleMove;
document.onmouseup = () => { if (startX !== null) handleEnd(); };

/* ── Keyboard ────────────────────────────────────── */
document.onkeydown = (e) => {
  if (e.code === 'Space')      { e.preventDefault(); toggleSolution(); }
  if (e.code === 'ArrowLeft')  markAnswer(false);
  if (e.code === 'ArrowRight') markAnswer(true);
};

document.getElementById('showSolutionBtn').onclick = toggleSolution;
document.getElementById('wrongBtn').onclick  = () => markAnswer(false);
document.getElementById('correctBtn').onclick = () => markAnswer(true);

document.querySelectorAll('#settingsForm input').forEach(input => {
  input.addEventListener('change', () => { updateURLParams(); onSettingsChange(); });
});

/* ── Init ────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  makeCheckboxes('range1_10',  1,  10);
  makeCheckboxes('range11_20', 11, 20);
  makeCheckboxes('range21_25', 21, 25);

  const params = getParams();
  if (params.selectedNums.length > 0) {
    params.selectedNums.forEach(num => {
      const cb = document.querySelector(`input[name=num][value="${num}"]`);
      if (cb) cb.checked = true;
    });
  } else {
    for (let i = 1; i <= 10; i++) {
      const cb = document.querySelector(`input[name=num][value="${i}"]`);
      if (cb) cb.checked = true;
    }
    updateURLParams();
  }

  document.getElementById('multifactor').checked = params.multifactor;
  document.getElementById('fractional').checked  = params.fractional;
  const wr = document.querySelector(`input[name="wurzelmode"][value="${params.wurzelmode}"]`);
  if (wr) wr.checked = true;

  refillPool();
  updateCounterDisplay();
  setTimeout(generateSquare, 0);
});
</script>

<footer class="site-footer">
  <div class="footer-content">
    M.&nbsp;Koch
    <span class="footer-topic">Mathe-Tools</span>
    <span class="footer-update">Zuletzt aktualisiert:&nbsp;<span id="last-update">...</span></span>
  </div>
</footer>

</body>
</html>
