<h1>Grenzverhalten $e$-Funktion üben</h1>

<details>
<summary>Einstellungen</summary>

<div class="form-block">
  <b>Maximaler Grad des Faktorpolynoms: <span id="degOut">2</span></b><br>
  <div class="slider-wrap">
    <input type="range" id="polyDeg" min="0" max="3" value="2" step="1" list="tickmarks2" oninput="updateParams()">
    <div class="slider-tick-labels">
      <span>0</span><span>1</span><span>2</span><span>3</span>
    </div>

</div>

<div class="form-block" id="innerBlock">
  <b>Exponent:</b><br>
  <div class="radio-group">
    <label>
      <input type="radio" name="innerMode" id="innerModeOnly" value="only" oninput="updateParams()">
      nur $~e^x~$
    </label>
    <label>
      <input type="radio" name="innerMode" id="innerModeMirror" value="mirror" oninput="updateParams()">
      auch $~e^{-x}~$ (horizontal gespiegelt)
    </label>
    <label>
      <input type="radio" name="innerMode" id="innerModePoly" value="poly" checked oninput="updateParams()">
      inneres Polynom
    </label>
  </div><br>
  <b>Maximaler Grad der inneren Polynomfunktion im Exponenten: <span id="degIn">1</span></b><br>
  <div class="slider-wrap">
    <input type="range" id="innerDeg" min="1" max="3" value="1" step="1" list="tickmarks" oninput="updateParams()">

    </div>
  </div>
</div>

    <input type="checkbox" id="distinguishZero" oninput="setupChoices()">
    Zwischen $0^+$ und $0^-$ unterscheiden
  </label>
</div>

<datalist id="tickmarks">
  <option value="1" label="1"></option>
  <option value="2" label="2"></option>

</datalist>

<datalist id="tickmarks2">
  <option value="0" label="0"></option>
  <option value="1" label="1"></option>
  <option value="2" label="2"></option>

</details>

<div class="scale-wrapper">
  <div id="task" class="scale-el"></div>

<div id="mainContainer">
  <div class="answer-block" id="leftContainer">

  </div>
</div>


<div style="clear: both;"></div>

<br>

<details id="explanationDetails">
<summary>Begründung</summary>

<div class="switch-container">
  <label class="switch">
    <input type="checkbox" id="explanationModeSwitch" onchange="updateExplanation()">
    <span class="slider"></span>
    <span class="labels">
      <span>Argumentation</span>
      <span>Testeinsetzungen</span>
    </span>
  </label>
</div>

<div class="scale-wrapper">
  <div id="explanation" class="scale-el"></div>
</div>

<details id="sketchDetails" style="margin: 6px;">
  <summary>Skizze</summary>
  <div style="text-align:center; padding:8px 0;">
    <img id="sketchImg" src="" alt="Skizze des Grenzverhaltens"
         style="max-width:min(100%, 400px); height:auto; display:block; margin:0 auto;">
  </div>
</details>

</details>
<script>
// ---------------- Hilfsfunktionen ----------------
const rand = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function makePoly(maxDeg){
  let deg = rand(0, maxDeg);
  // Mindestens Grad 0, aber wenn maxDeg>=1 soll mindestens 1 möglich sein,
  // also bleibt deg wie gezogen (0..maxDeg zufällig)
  let coeffs = [];
  {
    let c;
    do { c = rand(-5,5); } while(c === 0);
    coeffs.push(c);
    // Für Grad>0 noch weitere Koeffizienten
    for(let i=deg-1;i>=0;i--){
      coeffs.push(rand(-5,5));
    }
    // Grad 0: coeffs = [c] (Konstante)
    // Aber für deg=0 stimmt die obige Schleife: coeffs.push(c) → [c], Schleife von -1 bis 0 läuft nicht
  }
  function polyToString(coeffs){
    let s=''; let deg = coeffs.length-1;
    coeffs.forEach((c,idx)=>{
      let p = deg-idx; if(c===0) return;
      let term='';
      if(p===0) term=''+c;
      else if(p===1) term=(c===1?'':c===-1?'-':c)+'x';
      else term=(c===1?'':c===-1?'-':c)+`x^${p}`;
      s += (term.startsWith('-')?term:'+'+term);
    });
    return s.replace(/^\+/,'');
  }
  return { f: polyToString(coeffs), deg: deg, lead: coeffs[0] };
}

// Führendes Verhalten eines Polynoms
function polyBehavior(poly, side){
  // side = -1 für -infty, +1 für +infty
  const deg = poly.deg;
  const a = poly.lead;
  const sign = a * (side===1 ? 1 : (deg%2===0 ? 1 : -1));
  return sign > 0 ? '+infty' : '-infty';
}

let currentTask = null;


function updateExplanation(){
  if(!currentTask) return;
  
  const isTestMode = document.getElementById('explanationModeSwitch').checked;
  
  // URL-Parameter aktualisieren
  const url = new URL(window.location);
  url.searchParams.set('explanationMode', isTestMode ? 'test' : 'argument');
  window.history.replaceState({}, '', url);
  
  if(isTestMode){
    showTestValues();
  } else {
    showFactorArgument();
  }
}

function newTask(){
  document.getElementById('explanation').innerHTML = '';
  
  // Details schließen
  document.getElementById('explanationDetails').open = false;

  const maxDeg   = +document.getElementById('polyDeg').value;
  const innerMode = document.querySelector('input[name="innerMode"]:checked').value;
  const innerDeg = +document.getElementById('innerDeg').value;

  // Faktorpolynom: bei maxDeg=0 ist p eine Konstante
  let p;
  if(maxDeg === 0){
    // Konstante: nur Grad 0
    let c; do { c = rand(-5,5); } while(c === 0);
    p = { f: ''+c, deg: 0, lead: c };
  } else {
    p = makePoly(maxDeg);
  }

  let g;
  if(innerMode === 'only'){
    g = { f:'x', deg:1, lead:1 };
  } else if(innerMode === 'mirror'){
    // 50% e^x, 50% e^{-x}
    if(Math.random() < 0.5){
      g = { f:'x', deg:1, lead:1 };
    } else {
      g = { f:'-x', deg:1, lead:-1 };
    }
  } else {
    // poly: inneres Polynom, mindestens Grad 1
    let innerMaxDeg = Math.max(1, innerDeg);
    let tries = 0;
    do {
      g = makePoly(innerMaxDeg);
      tries++;
    } while(g.deg === 0 && tries < 20);
    // Sicherstellen Grad >= 1
    if(g.deg === 0){ g = { f:'x', deg:1, lead:1 }; }
  }

  // Darstellung: wenn p Grad 0 ist → C·e^{...}
  let fLatex;
  if(p.deg === 0){
    const C = p.lead;
    let prefactor;
    if(C === 1) prefactor = '';
    else if(C === -1) prefactor = '-';
    else prefactor = C + '\\,';
    fLatex = `f(x) = ${prefactor}e^{${g.f}}`;
  } else {
    fLatex = `f(x) = e^{${g.f}}\\cdot\\left(${p.f}\\right)`;
  }

  currentTask = { p, g };

  document.getElementById('task').innerHTML = `$$${fLatex}$$`;
  setupChoices();
  updateSketch();
  
  // Reaktiviere alle Radio-Buttons
  document.querySelectorAll('input[type="radio"]').forEach(r => {
    r.disabled = false;
  });
  
  MathJax.typesetPromise().then(() => scaleAllElements());
}

function loadURLParameters(){
  const url = new URL(window.location);
  const mode = url.searchParams.get('explanationMode');
  
  if(mode === 'test'){
    document.getElementById('explanationModeSwitch').checked = true;
  } else {
    document.getElementById('explanationModeSwitch').checked = false;
  }
}

function createRadioGroup(containerId, name, values){
  const cont = document.getElementById(containerId);
  cont.innerHTML = '';
  values.forEach(v => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="radio" name="${name}" value="${v}"> $${v}$`;
    cont.appendChild(label);
  });
}

// Berechnet korrektes Grenzverhalten
function computeLimit(side){
  const { p, g } = currentTask;
  const s = side === 'right' ? 1 : -1;

  // Verhalten von g(x)
  const gBeh = polyBehavior(g, s); // +infty oder -infty

  // e^{g(x)}
  let expBeh;
  if(gBeh === '+infty') expBeh = '+infty';
  else expBeh = '0';

  // Verhalten von p(x)
  // Bei Grad 0: p ist Konstante, Vorzeichen entscheidet
  let pBeh;
  if(p.deg === 0){
    pBeh = p.lead > 0 ? '+infty' : '-infty';
  } else {
    pBeh = polyBehavior(p, s); // +infty oder -infty
  }

  if(expBeh === '+infty'){
    return pBeh === '+infty' ? '+\\infty' : '-\\infty';
  } else {
    // gegen 0 von oben oder unten
    const distinguish = document.getElementById('distinguishZero').checked;
    if(distinguish){
      return pBeh === '+infty' ? '0^+' : '0^-';
    } else {
      return '0';
    }

  }
}

function checkSolution(){
  ['left','right'].forEach(side => {
    const correct = computeLimit(side);
    const radios = document.querySelectorAll(`input[name="${side}"]`);

    radios.forEach(r => {
      r.parentElement.classList.remove('correct','wrong');
      r.disabled = true; // Deaktiviere alle Radio-Buttons
      
      const isCorrectAnswer = r.value === correct || (r.value === '0' && correct.startsWith('0'));
      
      if(r.checked){
        // Eigene Antwort: grün wenn richtig, rot wenn falsch
        if(isCorrectAnswer){
          r.parentElement.classList.add('correct');
        } else {
          r.parentElement.classList.add('wrong');
        }
      } else if(isCorrectAnswer){
        // Richtige Antwort grün markieren (falls nicht gewählt)
        r.parentElement.classList.add('correct');
      }
    });
  });
}

function formatSci(x){
  if(x === 0) return '0';
  const exp = Math.floor(Math.log10(Math.abs(x)));
  const mant = x / Math.pow(10, exp);
  return mant.toFixed(2).replace('.', '{,}') + '\\cdot 10^{' + exp + '}';
}

function showTestValues(){

  const { p, g } = currentTask;

  const xL = -20;
  const xR = 20;

  function evalLeading(poly, x){
    return poly.lead * Math.pow(x, poly.deg);
  }

  function evalG(x){
    return g.lead * Math.pow(x, g.deg);
  }

  const gL = evalG(xL);
  const gR = evalG(xR);

  const pL = evalLeading(p, xL);
  const pR = evalLeading(p, xR);

  const eL = Math.exp(Math.min(gL, 100));
  const eR = Math.exp(Math.min(gR, 100));

  const fL = eL * pL;
  const fR = eR * pR;

  const limL = computeLimit('left');
  const limR = computeLimit('right');

  // Hilfsfunktion für die Beschreibung
  function getDescription(limit, fValue) {
    if (limit === '+\\infty') {
      return 'also etwas sehr Großes,';
    } else if (limit === '-\\infty') {
      return 'also etwas sehr großes Negatives,';
    } else if (limit === '0^+') {
      return 'also etwas sehr Kleines (positiv) nahe bei 0,';
    } else if (limit === '0^-') {
      return 'also etwas sehr Kleines (negativ) nahe bei 0,';
    } else if (limit === '0') {
      return 'also etwas sehr Kleines nahe bei 0,';
    }
    return '';
  }

  const html = `
    <table style="width:100%; border-collapse: collapse; table-layout: fixed;">

      <!-- obere hline -->
      <thead>
        <tr>
          <td colspan="2" style="border-top:2px solid black;"></td>
        </tr>
        <tr>
          <th style="text-align:center; border-bottom:2px solid black; border-right:2px solid black; padding:8px;">
            Für \\(x \\to -\\infty\\)
          </th>
          <th style="text-align:center; border-bottom:2px solid black; padding:8px;">
            Für \\(x \\to +\\infty\\)
          </th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td style="padding:8px; vertical-align:top; border-right:2px solid black;">
            <div>Testeinsetzung mit \\(x = ${xL}\\)</div>
            <div class="scale-wrapper" style="margin-top:4px;">
              <div class="scale-el">$$f(${xL}) \\approx ${formatSci(fL)}$$</div>
            </div>
            <div style="margin-top:4px;">
              ${getDescription(limL, fL)}
              d.h. vermutlich: \\(f(x) \\to ${limL}\\)
            </div>
          </td>

          <td style="padding:8px; vertical-align:top;">
            <div>Testeinsetzung mit \\(x = ${xR}\\)</div>
            <div class="scale-wrapper" style="margin-top:4px;">
              <div class="scale-el">$$f(${xR}) \\approx ${formatSci(fR)}$$</div>
            </div>
            <div style="margin-top:4px;">
              ${getDescription(limR, fR)}
              d.h. vermutlich: \\(f(x) \\to ${limR}\\)
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  `;

  document.getElementById('explanation').innerHTML = html;
  MathJax.typesetPromise().then(() => scaleAllElements());
}

function showFactorArgument() {
  const { p, g } = currentTask;

  const isConstant = p.deg === 0;

  // Erst die Polynomverhalten berechnen (nur nötig wenn nicht Konstante)
  let leftPoly, rightPoly;
  if(!isConstant){
    leftPoly  = polyBehavior(p,-1)==='+infty' ? '+\\infty' : '-\\infty';
    rightPoly = polyBehavior(p,1)==='+infty'  ? '+\\infty' : '-\\infty';
  }

  // Dann die Exponentialverhalten
  const leftExp  = computeLimit('left').startsWith('0') ? '0' : '+\\infty';
  const rightExp = computeLimit('right').startsWith('0') ? '0' : '+\\infty';

  // Indeterminate nur bei Polynom-Faktor relevant
  const leftIndeterminate  = !isConstant && leftExp === '0' && (leftPoly === '+\\infty' || leftPoly === '-\\infty');
  const rightIndeterminate = !isConstant && rightExp === '0' && (rightPoly === '+\\infty' || rightPoly === '-\\infty');

  // Die tatsächlichen Grenzwerte
  const leftLimit = computeLimit('left');
  const rightLimit = computeLimit('right');

  // Hilfsfunktion: Underbrace-Label für Konstante
  function constantLabel(c){
    return c > 0 ? '{>0}' : '{<0}';
  }

  // Darstellung der Terme je nach Typ
  function buildFormula(side, expBeh, polyBeh, limit){
    const C = p.lead;
    if(isConstant){
      // Darstellung: \underbrace{C}_{>0/<0} \cdot \underbrace{e^{...}}_{\to ...} \to limit
      const cSign = C > 0 ? '{>0}' : '{<0}';
      let cStr;
      if(C === 1) cStr = '1';
      else if(C === -1) cStr = '-1';
      else cStr = String(C);
      return `f(x) = \\underbrace{${cStr}}_{\\displaystyle ${cSign}} \\cdot \\underbrace{e^{${g.f}}}_{\\displaystyle \\to ${expBeh}} \\to ${limit}`;
    } else {
      return `f(x) = 
              \\underbrace{e^{${g.f}}}_{\\displaystyle \\to ${expBeh}} 
              \\cdot 
              \\underbrace{(${p.f})}_{\\displaystyle \\to ${polyBeh}}
              \\to ${limit}`;
    }
  }

  // Einleitungssatz: Grenzwert des Exponenten
  function expIntroSentence(side, expBeh){
    const arrow = side === 'left' ? '-\\infty' : '+\\infty';
    const expResult = expBeh === '0' ? '-\\infty' : '+\\infty';
    const consequence = expBeh === '0'
      ? 'd.h. der gesamte \\(e\\)-Term gegen \\(0\\).'
      : 'd.h. der gesamte \\(e\\)-Term gegen \\(+\\infty\\).';
    return `Der Exponent \\(${g.f}\\) verläuft für \\(x\\to${arrow}\\) gegen \\(${expResult}\\), ${consequence}`;
  }

  const html = `
    <table style="width:100%; border-collapse: collapse; table-layout: fixed;">
      <thead>
        <tr>
          <td colspan="2" style="border-top:2px solid black;"></td>
        </tr>
        <tr>
          <th style="text-align:center; border-bottom:2px solid black; border-right:2px solid black; padding:8px;">Für \\(x \\to -\\infty\\)</th>
          <th style="text-align:center; border-bottom:2px solid black; padding:8px;">Für \\(x \\to +\\infty\\)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="padding:8px; vertical-align:top; border-right:2px solid black;">
            <div style="margin-bottom:6px;">${expIntroSentence('left', leftExp)}</div>
            <div class="scale-wrapper">
              <div class="scale-el">$$${buildFormula('left', leftExp, leftPoly, leftLimit)}$$</div>
            </div>
            ${isConstant ? `` : ``}
            ${leftIndeterminate ? `
              <div style="margin-top:4px;">
                Unbestimmter Ausdruck \\(0 \\cdot \\pm\\infty\\): Die $e$-Funktion dominiert das Polynom, daher \\(f(x) \\to ${leftLimit}\\)
              </div>
            ` : ``}
          </td>
          <td style="padding:8px; vertical-align:top;">
            <div style="margin-bottom:6px;">${expIntroSentence('right', rightExp)}</div>
            <div class="scale-wrapper">
              <div class="scale-el">$$${buildFormula('right', rightExp, rightPoly, rightLimit)}$$</div>
            </div>
            ${rightIndeterminate ? `
              <div style="margin-top:4px;">
                Unbestimmter Ausdruck \\(0 \\cdot \\pm\\infty\\): Die $e$-Funktion dominiert das Polynom, daher \\(f(x) \\to ${rightLimit}\\)
              </div>
            ` : ``}
          </td>
        </tr>
      </tbody>
    </table>
  `;

  document.getElementById('explanation').innerHTML = html;
  MathJax.typesetPromise().then(() => scaleAllElements());
}

document.addEventListener('DOMContentLoaded', function() {
  const details = document.getElementById('explanationDetails');
  if(details) {
    details.addEventListener('toggle', function() {
      if(this.open && currentTask) {
        updateExplanation();
      }
    });
  }
});

// ---------------- Skizze ----------------
function computeLimitForSketch(side){
  // Wie computeLimit, aber unterscheidet immer zwischen 0+ und 0-
  const { p, g } = currentTask;
  const s = side === 'right' ? 1 : -1;
  const gBeh = polyBehavior(g, s);
  const expBeh = gBeh === '+infty' ? '+infty' : '0';
  let pBeh;
  if(p.deg === 0){
    pBeh = p.lead > 0 ? '+infty' : '-infty';
  } else {
    pBeh = polyBehavior(p, s);
  }
  if(expBeh === '+infty'){
    return pBeh === '+infty' ? 'p' : 'n';
  } else {
    return pBeh === '+infty' ? '0p' : '0n';
  }
}

function updateSketch(){
  if(!currentTask) return;
  const left  = computeLimitForSketch('left');
  const right = computeLimitForSketch('right');
  document.getElementById('sketchImg').src = `static/images/GrenzwertSkizzen/${left}${right}_limit.png`;
  document.getElementById('sketchDetails').open = false;
}

// URL-Parameter speichern
function saveSettingsToURL(){
  const url = new URL(window.location);

  const polyDeg = document.getElementById('polyDeg').value;
  const innerMode = document.querySelector('input[name="innerMode"]:checked')?.value ?? 'poly';
  const innerDeg = document.getElementById('innerDeg').value;
  const distinguishZero = document.getElementById('distinguishZero').checked;
  const explanationMode = document.getElementById('explanationModeSwitch').checked ? 'test' : 'argument';

  url.searchParams.set('polyDeg', polyDeg);
  url.searchParams.set('innerMode', innerMode);
  url.searchParams.set('distinguishZero', distinguishZero);
  url.searchParams.set('explanationMode', explanationMode);

  if(innerMode === 'poly'){
    url.searchParams.set('innerDeg', innerDeg);
  } else {
    url.searchParams.delete('innerDeg');
  }

  window.history.replaceState({}, '', url);
}

// URL-Parameter laden
function loadSettingsFromURL(){
  const url = new URL(window.location);
  
  // PolyDeg
  const polyDeg = url.searchParams.get('polyDeg');
  if(polyDeg !== null){
    document.getElementById('polyDeg').value = polyDeg;
  }
  
  // InnerMode
  const innerMode = url.searchParams.get('innerMode');
  if(innerMode !== null){
    const radio = document.querySelector(`input[name="innerMode"][value="${innerMode}"]`);
    if(radio) radio.checked = true;
  }
  
  // InnerDeg
  const innerDeg = url.searchParams.get('innerDeg');
  if(innerDeg !== null){
    document.getElementById('innerDeg').value = innerDeg;
  }
  
  // DistinguishZero
  const distinguishZero = url.searchParams.get('distinguishZero');
  if(distinguishZero !== null){
    document.getElementById('distinguishZero').checked = distinguishZero === 'true';
  }
  
  // ExplanationMode
  const mode = url.searchParams.get('explanationMode');
  if(mode === 'test'){
    document.getElementById('explanationModeSwitch').checked = true;
  } else {
    document.getElementById('explanationModeSwitch').checked = false;
  }
  // Nach dem Laden: UI korrekt aufbauen, aber noch NICHT speichern
  updateParams();
  setupChoices();
}

function updateParams(){
  const polyDeg = document.getElementById('polyDeg');
  const innerDeg = document.getElementById('innerDeg');
  const innerMode = document.querySelector('input[name="innerMode"]:checked')?.value ?? 'poly';

  // Slider deaktivieren wenn nicht "poly"
  const sliderWrap = innerDeg.closest('.slider-wrap');
  if(innerMode !== 'poly'){
    innerDeg.disabled = true;
    if(sliderWrap) sliderWrap.style.opacity = '0.4';
    document.getElementById('degIn').style.opacity = '0.4';
  } else {
    innerDeg.disabled = false;
    if(sliderWrap) sliderWrap.style.opacity = '';
    document.getElementById('degIn').style.opacity = '';
  }

  document.getElementById('degOut').innerText = polyDeg.value;
  document.getElementById('degIn').innerText = innerDeg.value;
  
  // URL aktualisieren
  saveSettingsToURL();
}

function setupChoices(){
  const distinguish = document.getElementById('distinguishZero').checked;
  const values = distinguish
    ? ['+\\infty','0^+','0^-','-\\infty']
    : ['+\\infty','0','-\\infty'];

  createRadioGroup('leftChoices','left',values);
  createRadioGroup('rightChoices','right',values);
  
  // URL aktualisieren
  saveSettingsToURL();
  
  // Nach dem Erstellen der Radio-Buttons MathJax aufrufen
  MathJax.typesetPromise().then(() => scaleAllElements());
}

window.onload = () => {
  loadSettingsFromURL(); // Lädt Settings, ruft updateParams + setupChoices
  MathJax.startup.promise.then(() => newTask());
};

</script>
